function NewTerrenoModal({onClose, onCreated}) {
  const [form,setForm]=useState({rol:"",terreno:"",ciudad:"Antofagasta",vigente:"SI",m2_sii:"",avaluo:"",uf_m2:"",sobretasa:false,proyecto:"",responsable:"",notas:""});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const create = async () => {
    if(!form.rol.trim()||!form.terreno.trim()||!form.ciudad){return;}
    setSaving(true);
    try{
      await db.insert("terrenos",[{
        rol:form.rol.trim(), terreno:form.terreno.trim(), ciudad:form.ciudad, vigente:form.vigente,
        m2_sii:parseFloat(form.m2_sii)||0, avaluo:parseInt(form.avaluo)||0, uf_m2:parseFloat(form.uf_m2)||0,
        sobretasa:form.sobretasa, proyecto:form.proyecto||null,
        responsable:form.responsable||null, notas:form.notas||null
      }]);
      logAudit("nuevo_terreno",`Creó terreno "${form.terreno.trim()}" (${form.ciudad})`,`${form.terreno.trim()} · ${form.rol.trim()}`);
      onCreated();onClose();
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };

  return (
    <Modal title="Nuevo Terreno" onClose={onClose} large
      footer={<>
        <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={create} disabled={!form.rol.trim()||!form.terreno.trim()||saving}>
          {saving?"Guardando...":"Crear terreno"}
        </button>
      </>}>
      <div className="field-row">
        <div className="field"><label>ROL SII *</label><input value={form.rol} onChange={e=>set("rol",e.target.value)} placeholder="ej: 5511-01"/></div>
        <div className="field"><label>Ciudad *</label>
          <select value={form.ciudad} onChange={e=>set("ciudad",e.target.value)}>
            {CIUDADES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div className="field"><label>Nombre del terreno *</label><input value={form.terreno} onChange={e=>set("terreno",e.target.value)} placeholder="ej: LOTE 1A3 CERRO PARANAL 315"/></div>
      <div className="field-row">
        <div className="field"><label>M² SII</label>
          <input type="text" inputMode="decimal"
            value={fmtCLInput(form.m2_sii, true)}
            onChange={e=>set("m2_sii", parseCLInput(e.target.value, true))}/>
        </div>
        <div className="field"><label>UF/m²</label><input type="number" step="0.01" value={form.uf_m2} onChange={e=>set("uf_m2",e.target.value)}/></div>
      </div>
      <div className="field-row">
        <div className="field"><label>Avalúo fiscal ($CLP)</label>
          <input type="text" inputMode="numeric"
            value={fmtCLInput(form.avaluo, false)}
            onChange={e=>set("avaluo", parseCLInput(e.target.value, false))}/>
        </div>
        <div className="field"><label>Proyecto asociado</label><input value={form.proyecto} onChange={e=>set("proyecto",e.target.value)} placeholder="ej: Las Vicuñas"/></div>
      </div>
      <div className="field-row">
        <div className="field"><label>Responsable</label>
          <select value={form.responsable} onChange={e=>set("responsable",e.target.value)}>
            <option value="">— Sin asignar —</option>
            {RESPONSABLES.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
        <div className="field"><label>Sobretasa</label>
          <select value={form.sobretasa?"Si":"No"} onChange={e=>set("sobretasa",e.target.value==="Si")}>
            <option>No</option><option>Si</option>
          </select>
        </div>
      </div>
      <div className="field"><label>Notas</label><textarea value={form.notas} onChange={e=>set("notas",e.target.value)} rows={2} placeholder="Observaciones adicionales..."/></div>
    </Modal>
  );
}

// ─────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────
function App({user, onLogout}) {
  const [terrenos, setTerrenos] = useState([]);
  const [selRol, setSelRol] = useState(null);
  const [cuotas, setCuotas] = useState([]);
  const [bitacora, setBitacora] = useState([]);
  const [devoluciones, setDevoluciones] = useState([]);
  const [archivos, setArchivos] = useState({});
  const [allCuotas, setAllCuotas] = useState([]);
  const [allBitacora, setAllBitacora] = useState([]);
  const [allDevoluciones, setAllDevoluciones] = useState([]);
  const [subtareas, setSubtareas] = useState({});
  const [archivosSub, setArchivosSub] = useState({});
  const [hiddenRols, setHiddenRols] = useState(()=>new Set(JSON.parse(localStorage.getItem('hiddenRols')||'[]')));
  const [showHidden, setShowHidden] = useState(false);
  const [activeTab, setActiveTab] = useState("info");
  const [search, setSearch] = useState("");
  const [syncStatus, setSyncStatus] = useState("ok");
  const [loading, setLoading] = useState(true);
  const [showNew, setShowNew] = useState(false);
  const [exportBusy, setExportBusy] = useState(false);
  const [auditLogs, setAuditLogs] = useState([]);
  const [auditUnread, setAuditUnread] = useState(0);
  const [showAudit, setShowAudit] = useState(false);
  const auditRef = useRef(null);
  const [openCities, setOpenCities] = useState({});

  const loadAll = useCallback(async () => {
    setSyncStatus("loading");
    try{
      const [t, c, b, d] = await Promise.all([
        db.select("terrenos","order=ciudad.asc,terreno.asc"),
        db.select("cuotas","order=anio.desc,numero.asc"),
        db.select("bitacora","order=fecha.desc"),
        db.select("devoluciones","order=fecha.desc")
      ]);
      setTerrenos(t); setAllCuotas(c); setAllBitacora(b); setAllDevoluciones(d);
      setSyncStatus("ok");
      // Auto-open first city
      if(t.length>0){
        setOpenCities(prev=>{
          if(Object.keys(prev).length>0) return prev;
          return {[t[0].ciudad]:true};
        });
      }
    }catch(e){setSyncStatus("error");}
    setLoading(false);
  }, []);


  const seedIfEmpty = useCallback(async () => {
    if(!window.INITIAL_DATA||window.INITIAL_DATA.length===0) return;
    try{
      const existing = await db.select("terrenos","limit=1");
      if(existing.length>0) return; // already has data
      const anio = new Date().getFullYear();
      const CUOTA_DATES_LOCAL = {1:"04-30",2:"06-30",3:"09-30",4:"11-28"};
      // Insert terrenos
      const terrenosArr = window.INITIAL_DATA.map(d=>({
        rol:d.rol, terreno:d.terreno, vigente:d.vigente||"SI", ciudad:d.ciudad,
        m2_sii:d.m2_sii||0, avaluo:d.avaluo||0, uf_m2:d.uf_m2||0,
        sobretasa:d.sobretasa||false, proyecto:d.proyecto||null,
        responsable:null, notas:null
      }));
      await db.upsert("terrenos", terrenosArr);
      // Insert cuotas
      const cuotasArr = [];
      window.INITIAL_DATA.forEach(d=>{
        if(!d.cuota_monto) return;
        for(let n=1;n<=4;n++){
          cuotasArr.push({terreno_rol:d.rol,anio,numero:n,
            monto:d.cuota_monto,tasa:d.tasa||0,
            fecha_vencimiento:`${anio}-${CUOTA_DATES_LOCAL[n]}`,pagado:false});
        }
      });
      if(cuotasArr.length>0) await db.upsert("cuotas",cuotasArr);
      // Insert bitácora
      const bitaArr = [];
      window.INITIAL_DATA.forEach(d=>{
        if(d.detalle_tarea){
          bitaArr.push({terreno_rol:d.rol,
            fecha:d.fecha_tarea||new Date().toISOString().slice(0,10),
            detalle:d.detalle_tarea,
            estatus:d.estatus||"Pendiente", responsable:null});
        }
        if(d.extra_bitacora){
          d.extra_bitacora.forEach(e=>{
            if(e.detalle) bitaArr.push({terreno_rol:d.rol,
              fecha:e.fecha||new Date().toISOString().slice(0,10),
              detalle:e.detalle, estatus:e.estatus||"Pendiente", responsable:null});
          });
        }
      });
      for(const b of bitaArr){ try{ await db.insert("bitacora",[b]); }catch(e){} }
      console.log("Seed completado:",terrenosArr.length,"terrenos,",cuotasArr.length,"cuotas,",bitaArr.length,"entradas bitácora");
    }catch(e){console.error("Seed error:",e);}
  },[]);

  useEffect(()=>{seedIfEmpty().then(()=>loadAll());},[loadAll, seedIfEmpty]);

  const loadDetail = useCallback(async (rol) => {
    if(!rol) return;
    try{
      const enc = encodeURIComponent(rol);
      const [c, b, d] = await Promise.all([
        db.select("cuotas","terreno_rol=eq."+enc+"&order=anio.desc,numero.asc"),
        db.select("bitacora","terreno_rol=eq."+enc+"&order=fecha.desc"),
        db.select("devoluciones","terreno_rol=eq."+enc+"&order=fecha.desc")
      ]);
      setCuotas(c); setBitacora(b); setDevoluciones(d);
      if(b.length>0){
        const ids = b.map(x=>x.id).join(",");
        const a = await db.select("archivos","bitacora_id=in.("+ids+")&order=created_at.asc");
        const map = {};
        a.forEach(f=>{if(!map[f.bitacora_id])map[f.bitacora_id]=[];map[f.bitacora_id].push(f);});
        setArchivos(map);
      }else{setArchivos({});}
      // Load subtareas
      if(b.length>0){
        const bitIds=b.map(x=>x.id).join(",");
        const subs=await db.select("subtareas","bitacora_id=in.("+bitIds+")&order=created_at.asc");
        const subMap={};
        subs.forEach(s=>{if(!subMap[s.bitacora_id])subMap[s.bitacora_id]=[];subMap[s.bitacora_id].push(s);});
        setSubtareas(subMap);
        if(subs.length>0){
          const subIds=subs.map(s=>s.id).join(",");
          const asSub=await db.select("archivos_subtareas","subtarea_id=in.("+subIds+")&order=created_at.asc");
          const asMap={};
          asSub.forEach(f=>{if(!asMap[f.subtarea_id])asMap[f.subtarea_id]=[];asMap[f.subtarea_id].push(f);});
          setArchivosSub(asMap);
        }else{setArchivosSub({});}
      }else{setSubtareas({});setArchivosSub({});}
    }catch(e){console.error(e);}
  },[]);

  useEffect(()=>{
    if(selRol) loadDetail(selRol);
    else{setCuotas([]);setBitacora([]);setDevoluciones([]);setArchivos({});}
  },[selRol, loadDetail]);

  const toggleHide=useCallback((rol,e)=>{
    e.stopPropagation();
    setHiddenRols(prev=>{
      const next=new Set(prev);
      if(next.has(rol)) next.delete(rol); else next.add(rol);
      localStorage.setItem('hiddenRols',JSON.stringify([...next]));
      return next;
    });
  },[]);

  const refreshAll = () => { loadDetail(selRol); loadAll(); };

  // ── Audit log ──
  const loadAuditLogs = useCallback(async () => {
    if(!db) return;
    try{
      const rows = await db.select("audit_log","order=created_at.desc&limit=40");
      setAuditLogs(rows||[]);
    }catch(e){console.error("Audit load",e);}
  }, []);

  useEffect(() => {
    // Replace the global stub with a closure over current user
    logAudit = async (actionType, description, projectName="") => {
      if(!db) return;
      try{
        await db.insert("audit_log",[{
          user_email: (user && user.email) || "",
          user_name: emailToNameAudit((user && user.email) || "") || "",
          project_name: projectName || "",
          action_type: actionType || "",
          description: description || ""
        }]);
        setAuditUnread(n=>n+1);
        loadAuditLogs();
      }catch(e){console.error("Audit insert",e);}
    };
  }, [user, loadAuditLogs]);

  useEffect(() => {
    if(!db) return;
    loadAuditLogs();
    const t = setInterval(()=>{ if(db) loadAuditLogs(); }, 30000);
    return () => clearInterval(t);
  }, [loadAuditLogs]);

  // Close audit panel on outside click
  useEffect(() => {
    if(!showAudit) return;
    const handler = (e) => {
      if(auditRef.current && !auditRef.current.contains(e.target)) setShowAudit(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [showAudit]);

  const exportJSON = async () => {
    setExportBusy(true);
    try{
      const [terrenos, cuotas, bitacora, devoluciones, archivos, subtareas, archivos_subtareas] = await Promise.all([
        db.select("terrenos","order=ciudad.asc,terreno.asc"),
        db.select("cuotas","order=anio.desc,numero.asc"),
        db.select("bitacora","order=fecha.desc"),
        db.select("devoluciones","order=fecha.desc"),
        db.select("archivos","order=created_at.asc"),
        db.select("subtareas","order=created_at.asc"),
        db.select("archivos_subtareas","order=created_at.asc"),
      ]);
      const backup = {
        version: 1,
        app: "Gestor de Terrenos - Guzmán & Larraín",
        exported_at: new Date().toISOString(),
        exported_by: (user && user.email) || null,
        counts: {
          terrenos: terrenos.length, cuotas: cuotas.length, bitacora: bitacora.length,
          devoluciones: devoluciones.length, archivos: archivos.length,
          subtareas: subtareas.length, archivos_subtareas: archivos_subtareas.length
        },
        notes: "Respaldo de datos. No incluye el contenido binario de archivos del bucket, ni usuarios/contraseñas. El código vive en GitHub.",
        tables: { terrenos, cuotas, bitacora, devoluciones, archivos, subtareas, archivos_subtareas }
      };
      const json = JSON.stringify(backup, null, 2);
      const blob = new Blob([json], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
      a.href = url;
      a.download = `gestor-terrenos-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){
      alert("Error al generar respaldo: "+e.message);
    }
    setExportBusy(false);
  };

  const selTerreno = terrenos.find(t=>t.rol===selRol);

  // Sidebar groups — ordenar ciudades de norte a sur (segun CIUDADES) y
  // terrenos dentro de cada ciudad por ROL (numéricamente, no alfabético).
  const compareRol = (a, b) => {
    const pa = String(a.rol||"").split("-").map(x=>parseInt(x,10)||0);
    const pb = String(b.rol||"").split("-").map(x=>parseInt(x,10)||0);
    const n = Math.max(pa.length, pb.length);
    for(let i=0;i<n;i++){
      const va = pa[i]||0, vb = pb[i]||0;
      if(va !== vb) return va - vb;
    }
    return String(a.rol||"").localeCompare(String(b.rol||""));
  };
  const cityRank = {};
  CIUDADES.forEach((c,i)=>{ cityRank[c] = i; });
  const cityMap={}, cityOrder=[];
  terrenos
    .filter(t=>{
      const sOK = !search||(t.terreno+" "+t.rol+" "+(t.proyecto||"")).toLowerCase().includes(search.toLowerCase());
      return sOK;
    })
    .forEach(t=>{
      if(!cityMap[t.ciudad]){cityMap[t.ciudad]=[];cityOrder.push(t.ciudad);}
      cityMap[t.ciudad].push(t);
    });
  // Reordenar ciudades: las listadas en CIUDADES siguen ese orden, el resto al final (alfabético)
  cityOrder.sort((a,b)=>{
    const ra = cityRank[a]!==undefined ? cityRank[a] : 999;
    const rb = cityRank[b]!==undefined ? cityRank[b] : 999;
    if(ra !== rb) return ra - rb;
    return String(a).localeCompare(String(b));
  });
  // Ordenar los terrenos de cada ciudad por ROL numérico
  Object.keys(cityMap).forEach(c=>{ cityMap[c].sort(compareRol); });

  const hasBadge = (_rol) => "#5a5750"; // Punto gris neutro para todos (sin semáforo)

  const selectTerreno = (rol) => {
    setSelRol(rol); setActiveTab("info");
    // auto-open that city
    const t = terrenos.find(x=>x.rol===rol);
    if(t) setOpenCities(prev=>({...prev,[t.ciudad]:true}));
  };

  return (
    <div className="app">
      {/* ─ SIDEBAR ─ */}
      <div className="sidebar">
        <div className="sidebar-brand">
          <div className="sidebar-logo-wrap"><img src="logo.jpg" alt="Guzmán & Larraín"/></div>
          <h1>Gestor de Terrenos</h1>
        </div>
        <div className="sidebar-search">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar terreno o ROL..."/>
        </div>

        <div className="terreno-list">
          {cityOrder.map(city=>{
            const items=cityMap[city]; const isOpen=!!openCities[city];
            const hasActive=items.some(t=>t.rol===selRol);
            return (
              <div key={city} className="city-group">
                <div className="city-header" onClick={()=>setOpenCities(p=>({...p,[city]:!p[city]}))}>
                  <span className={`city-arrow${isOpen?" open":""}`}>▶</span>
                  <span className="city-name" style={hasActive?{color:"#a0c8d0"}:{}}>{city}</span>
                  <span className="city-count">{items.length}</span>
                </div>
                {isOpen&&(
                  <div className="city-terrenos">
                    {(showHidden?items:items.filter(t=>!hiddenRols.has(t.rol))).map(t=>{
                      const isHidden=hiddenRols.has(t.rol);
                      return (
                        <div key={t.rol}
                          className={`terreno-item${selRol===t.rol?" active":""}${isHidden?" hidden-item":""}`}
                          onClick={()=>!isHidden&&selectTerreno(t.rol)}>
                          <span className="t-dot" style={{background:isHidden?"#5a5750":hasBadge(t.rol)}}/>
                          <div className="t-info">
                            <div className="t-name">{t.terreno}</div>
                            <div className="t-rol">{t.rol}</div>
                          </div>
                          <button className="hide-btn" onClick={(e)=>toggleHide(t.rol,e)}
                            title={isHidden?"Mostrar terreno":"Ocultar terreno"}>
                            {isHidden?"👁":"🙈"}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
          {cityOrder.length===0&&!loading&&(
            <div style={{padding:"20px 10px",color:"#5a5750",fontSize:12,textAlign:"center"}}>
              Sin terrenos.<br/>Importa el Excel o crea uno nuevo.
            </div>
          )}
        </div>

        <div className="sidebar-bottom">
          <button className="sbtn sbtn-primary" onClick={()=>setShowNew(true)}>＋ Nuevo terreno</button>
          <button className="sbtn sbtn-ghost" onClick={exportJSON} disabled={exportBusy} title="Descargar respaldo de todos los datos en JSON">
            {exportBusy ? "⏳ Generando respaldo..." : "⇩ Descargar respaldo (JSON)"}
          </button>
          <button className="sbtn sbtn-ghost" onClick={()=>setSelRol(null)}>⊞ Dashboard global</button>
          {hiddenRols.size>0&&(
            <button className="sbtn sbtn-ghost" onClick={()=>setShowHidden(s=>!s)}>
              {showHidden?"🙈 Ocultar ocultos":"👁 Ocultos ("+hiddenRols.size+")"}
            </button>
          )}
        </div>

        <UserBar user={user} onLogout={onLogout}/>
        <div className="sync-bar">
          <div className={`sync-dot ${syncStatus==="loading"?"loading":syncStatus==="error"?"error":"ok"}`}/>
          <span className="sync-text">{syncStatus==="loading"?"Sincronizando...":syncStatus==="error"?"Error de conexión":"Conectado"}</span>
          <button className="sync-refresh" onClick={loadAll} title="Recargar">↺</button>
        </div>
      </div>

      {/* ─ MAIN ─ */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            {selTerreno ? (
              <>
                <h2>{selTerreno.terreno}</h2>
                <span style={{fontFamily:"monospace",fontSize:11.5,color:"var(--ink3)",background:"var(--bg2)",padding:"2px 8px",borderRadius:4,flexShrink:0}}>{selTerreno.rol}</span>
                {selTerreno.ciudad&&<span style={{fontSize:12,color:"var(--ink3)"}}>{selTerreno.ciudad}</span>}
              </>
            ):<h2>Dashboard de Terrenos</h2>}
          </div>
          <div className="topbar-right">
            <span style={{fontSize:12,color:"var(--ink3)"}}>
              {terrenos.length} terrenos · {allCuotas.filter(c=>!c.pagado&&c.fecha_vencimiento&&c.fecha_vencimiento<today()).length} cuotas vencidas
            </span>
            <div className="audit-bell-wrap" ref={auditRef}>
              <button className="audit-bell-btn" onClick={()=>{setShowAudit(s=>!s); setAuditUnread(0);}} title="Historial de cambios">
                🔔
                {auditUnread>0 && <span className="audit-badge">{auditUnread>99?"99+":auditUnread}</span>}
              </button>
              {showAudit && (
                <div className="audit-panel">
                  <div className="audit-panel-head">
                    <h4>🔔 Historial de cambios</h4>
                    <button className="btn btn-ghost btn-xs" onClick={()=>setShowAudit(false)}>✕</button>
                  </div>
                  <div className="audit-list">
                    {auditLogs.length===0 ? (
                      <div className="audit-empty">Sin cambios registrados aún.</div>
                    ) : auditLogs.map((e,i)=>{
                      const dt = new Date(e.created_at);
                      const when = isNaN(dt) ? "—" : dt.toLocaleString("es-CL",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
                      return (
                        <div key={e.id||i} className="audit-entry">
                          <div className="audit-entry-who">
                            <span className="audit-who-name">👤 {e.user_name||e.user_email||"Usuario"}</span>
                            <span className="audit-when">{when}</span>
                          </div>
                          {e.project_name && <div className="audit-entry-proj">📁 {e.project_name}</div>}
                          <div className="audit-entry-desc">{e.description}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="content">
          {loading ? (
            <div className="loading-cover">
              <div className="spinner"/>
              <span style={{color:"var(--ink3)",fontSize:13}}>Cargando terrenos...</span>
            </div>
          ):!selTerreno ? (
            <Dashboard terrenos={terrenos} allCuotas={allCuotas} allBitacora={allBitacora} allDevoluciones={allDevoluciones} onSelectTerreno={selectTerreno} hiddenRols={hiddenRols}/>
          ):(
            <>
              <div className="tab-nav">
                {[["info","📋 Información"],["cuotas","💰 Contribuciones"],["devoluciones","↩️ Devoluciones (caja)"],["bitacora","📓 Bitácora"]].map(([id,lbl])=>(
                  <button key={id} className={`tab-btn${activeTab===id?" active":""}`} onClick={()=>setActiveTab(id)}>{lbl}</button>
                ))}
              </div>

              {activeTab==="info"&&(
                <InfoTab terreno={selTerreno} onUpdated={updated=>{
                  setTerrenos(ts=>ts.map(t=>t.rol===updated.rol?{...t,...updated}:t));
                  loadAll();
                }}/>
              )}
              {activeTab==="cuotas"&&(
                <CuotasTab terreno={selTerreno} cuotas={cuotas} onRefresh={refreshAll}/>
              )}
              {activeTab==="devoluciones"&&(
                <DevolucionesTab terreno={selTerreno} devoluciones={devoluciones} cuotas={cuotas} onRefresh={refreshAll}/>
              )}
              {activeTab==="bitacora"&&(
                <BitacoraTab terreno={selTerreno} bitacora={bitacora} archivos={archivos} subtareas={subtareas} archivosSub={archivosSub} onRefresh={refreshAll} user={user}/>
              )}
            </>
          )}
        </div>
      </div>

      {showNew&&<NewTerrenoModal onClose={()=>setShowNew(false)} onCreated={()=>{setShowNew(false);loadAll();}}/>}
    </div>
  );
}

let supabaseAuth = null;
let currentUser = null;

function initSupabaseAuth(url, key) {
  if(window.supabase && window.supabase.createClient) {
    supabaseAuth = window.supabase.createClient(url, key);
  }
}

// ─────────────────────────────────────────────────────
// LOGIN SCREEN
// ─────────────────────────────────────────────────────
function AuthScreen({onAuthed, sbUrl, sbKey}) {
  const [mode, setMode] = useState('login'); // login | reset
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  const handleLogin = async () => {
    if(!email.trim()||!password.trim()){setError('Ingresa email y contraseña.');return;}
    setBusy(true);setError('');
    try{
      const {data,error:e} = await supabaseAuth.auth.signInWithPassword({email:email.trim(),password});
      if(e) throw e;
      onAuthed(data.user);
    }catch(e){
      setError(e.message==='Invalid login credentials'?'Email o contraseña incorrectos.':e.message);
    }
    setBusy(false);
  };

  const handleReset = async () => {
    if(!email.trim()){setError('Ingresa tu email.');return;}
    setBusy(true);setError('');setSuccess('');
    try{
      const {error:e} = await supabaseAuth.auth.resetPasswordForEmail(email.trim(),{
        redirectTo: window.location.href
      });
      if(e) throw e;
      setSuccess('Te enviamos un email para restablecer tu contraseña.');
    }catch(e){setError(e.message);}
    setBusy(false);
  };

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-wrap"><img src="logo.jpg" alt="Guzmán & Larraín"/></div>
          <h1>Gestor de Terrenos</h1>
          <p>Guzmán & Larraín</p>
        </div>
        {error&&<div className="auth-error">{error}</div>}
        {success&&<div className="auth-success">{success}</div>}
        {mode==='login'?(
          <>
            <div className="field" style={{marginBottom:12}}>
              <label>Email corporativo</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="nombre@guzmanlarrain.cl" onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
            </div>
            <div className="field" style={{marginBottom:20}}>
              <label>Contraseña</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}}
              onClick={handleLogin} disabled={busy}>
              {busy?'Ingresando...':'Ingresar →'}
            </button>
            <div className="auth-footer">
              <button className="auth-toggle" onClick={()=>{setMode('reset');setError('');setSuccess('');}}>
                ¿Olvidaste tu contraseña?
              </button>
            </div>
          </>
        ):(
          <>
            <p style={{fontSize:13,color:'var(--ink3)',marginBottom:14,lineHeight:1.6}}>
              Ingresa tu email y te enviaremos un link para restablecer tu contraseña.
            </p>
            <div className="field" style={{marginBottom:18}}>
              <label>Email</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="nombre@guzmanlarrain.cl" onKeyDown={e=>e.key==='Enter'&&handleReset()}/>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}}
              onClick={handleReset} disabled={busy}>
              {busy?'Enviando...':'Enviar email de recuperación'}
            </button>
            <div className="auth-footer">
              <button className="auth-toggle" onClick={()=>{setMode('login');setError('');setSuccess('');}}>
                ← Volver al login
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// USER BAR in Sidebar
// ─────────────────────────────────────────────────────
function UserBar({user, onLogout}) {
  const initials = user.email?user.email.slice(0,2).toUpperCase():'U';
  const shortEmail = user.email||'';
  const [showChange, setShowChange] = useState(false);
  return (
    <>
      <div className="user-bar">
        <div className="user-avatar">{initials}</div>
        <div className="user-info">
          <div className="user-email">{shortEmail}</div>
          <div className="user-role">Sesión activa</div>
        </div>
        <button className="user-action-btn" onClick={()=>setShowChange(true)} title="Cambiar contraseña">🔑</button>
        <button className="logout-btn" onClick={onLogout} title="Cerrar sesión">⏻</button>
      </div>
      {showChange && <ChangePasswordModal onClose={()=>setShowChange(false)}/>}
    </>
  );
}

function ChangePasswordModal({onClose}) {
  const [newPw, setNewPw] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  const handleChange = async () => {
    setError('');
    if(newPw.length < 8){ setError('La contraseña debe tener al menos 8 caracteres.'); return; }
    if(newPw !== confirmPw){ setError('Las contraseñas no coinciden.'); return; }
    setBusy(true);
    try{
      const {error:e} = await supabaseAuth.auth.updateUser({password:newPw});
      if(e) throw e;
      try{ const s = await supabaseAuth.auth.getSession(); const email = s?.data?.session?.user?.email||""; logAudit("cambio_password",`${email||"El usuario"} cambió su contraseña`,""); }catch{}
      setSuccess(true);
      setTimeout(()=>onClose(), 2000);
    }catch(e){
      setError(e.message || 'Error al cambiar la contraseña.');
      setBusy(false);
    }
  };

  return (
    <Modal title="Cambiar contraseña" onClose={onClose}>
      {success ? (
        <div style={{textAlign:'center',padding:'20px 10px'}}>
          <div style={{fontSize:40,marginBottom:10,color:'var(--green)'}}>✓</div>
          <p style={{color:'var(--green)',fontWeight:500}}>Contraseña actualizada correctamente.</p>
          <p style={{fontSize:12,color:'var(--ink3)',marginTop:8}}>Ya puedes cerrar este diálogo.</p>
        </div>
      ) : (
        <>
          {error && <div className="auth-error">{error}</div>}
          <div className="field" style={{marginBottom:12}}>
            <label>Nueva contraseña</label>
            <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} autoFocus placeholder="Mínimo 8 caracteres"/>
          </div>
          <div className="field" style={{marginBottom:16}}>
            <label>Confirmar nueva contraseña</label>
            <input type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&handleChange()}/>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost btn-sm" onClick={onClose} disabled={busy}>Cancelar</button>
            <button className="btn btn-primary btn-sm" onClick={handleChange} disabled={busy||!newPw||!confirmPw}>
              {busy ? 'Cambiando...' : 'Cambiar contraseña'}
            </button>
          </div>
        </>
      )}
    </Modal>
  );
}

// ─────────────────────────────────────────────────────
// ROOT
// ─────────────────────────────────────────────────────
function Root() {
  const [phase, setPhase] = useState('loading');
  const [user, setUser] = useState(null);

  useEffect(()=>{
    db = new SupabaseClient('https://hpztcgooeuwacyvniyle.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwenRjZ29vZXV3YWN5dm5peWxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODI1ODgsImV4cCI6MjA5MDQ1ODU4OH0.AdJMDIjXfXHGB697u3xyobEfkCM2IePX6lDYTbWtSF0');
    initSupabaseAuth('https://hpztcgooeuwacyvniyle.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwenRjZ29vZXV3YWN5dm5peWxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODI1ODgsImV4cCI6MjA5MDQ1ODU4OH0.AdJMDIjXfXHGB697u3xyobEfkCM2IePX6lDYTbWtSF0');
    if(supabaseAuth){
      // Keep db.authToken synced with the active session (handles refresh + logout)
      supabaseAuth.auth.onAuthStateChange((_event, session)=>{
        db.setAuthToken(session?.access_token || null);
      });
      supabaseAuth.auth.getSession().then((res)=>{
        const session = res.data && res.data.session;
        if(session && session.user){
          db.setAuthToken(session.access_token);
          setUser(session.user);
          setPhase('app');
        } else {
          setPhase('auth');
        }
      }).catch(()=>setPhase('auth'));
    } else {
      setTimeout(()=>setPhase('auth'), 500);
    }
  },[]);

  const handleAuthed=async(u)=>{
    try{
      const {data} = await supabaseAuth.auth.getSession();
      if(data?.session?.access_token) db.setAuthToken(data.session.access_token);
    }catch{}
    setUser(u);setPhase('app');
  };

  const handleLogout=async()=>{
    if(supabaseAuth) await supabaseAuth.auth.signOut();
    db.setAuthToken(null);
    setUser(null);setPhase('auth');
  };

  if(phase==='loading') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}>
      <div className="spinner"/>
    </div>
  );
  if(phase==='auth') return <AuthScreen onAuthed={handleAuthed}/>;
  return <App user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
