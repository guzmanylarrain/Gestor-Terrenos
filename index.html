<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://hpztcgooeuwacyvniyle.supabase.co; connect-src 'self' https://hpztcgooeuwacyvniyle.supabase.co wss://hpztcgooeuwacyvniyle.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"/>
<title>Gestor de Terrenos — Guzmán & Larraín</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.104.0/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;--bg2:#eceae4;--white:#fff;
  --ink:#1c1a17;--ink2:#4a4740;--ink3:#8a8780;--line:#d8d4cc;
  --teal:#1a5f6e;--teal2:#227080;--teal-lt:#e8f4f7;
  --red:#c0392b;--red-lt:#fdf0ee;--amber:#b7620a;--amber-lt:#fef4e8;
  --green:#1a7a4a;--green-lt:#eaf6f0;--purple:#6e1a6e;--purple-lt:#f7e8f7;
  --shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.13)
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:13.5px}
h1,h2,h3,h4{font-family:'Libre Baskerville',serif}
button,input,select,textarea{font-family:'IBM Plex Sans',sans-serif;cursor:pointer}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:258px;flex-shrink:0;background:#1c1a17;color:#d8d4cc;display:flex;flex-direction:column;overflow:hidden}
.sidebar-brand{padding:10px 12px 10px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sidebar-brand h1{font-size:12.5px;color:#f0eeea;line-height:1.35;margin-top:6px}
.sidebar-brand span{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#5a5750}
.sidebar-logo-wrap{background:#fff;border-radius:8px;padding:8px 10px;display:block;margin-bottom:4px;line-height:0}
.sidebar-logo-wrap img{width:100%;height:auto;display:block}
.sidebar-search{padding:8px 10px 4px}
.sidebar-search input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:6px 10px;font-size:12px;color:#d8d4cc;outline:none;transition:border 0.14s}
.sidebar-search input:focus{border-color:rgba(26,95,110,0.6)}
.sidebar-search input::placeholder{color:#4a4740}
.terreno-list{flex:1;overflow-y:auto;padding:4px 8px 10px}
.terreno-list::-webkit-scrollbar{width:3px}
.terreno-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.city-group{margin-bottom:2px}
.city-header{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:all 0.14s;user-select:none}
.city-header:hover{background:rgba(255,255,255,0.04)}
.city-arrow{font-size:8px;color:#5a5750;transition:transform 0.2s;display:inline-block;width:10px;flex-shrink:0}
.city-arrow.open{transform:rotate(90deg)}
.city-name{flex:1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#7a7770}
.city-count{font-size:10px;color:#4a4740;background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px}
.city-terrenos{padding-left:8px;border-left:1px solid rgba(255,255,255,0.06);margin-left:10px}
.terreno-item{padding:7px 9px;border-radius:5px;cursor:pointer;transition:all 0.14s;border:1px solid transparent;margin-bottom:1px;display:flex;align-items:center;gap:7px}
.terreno-item:hover{background:rgba(255,255,255,0.05)}
.terreno-item.active{background:rgba(26,95,110,0.3);border-color:rgba(26,95,110,0.45)}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px rgba(0,0,0,0.3)}
.t-info{flex:1;min-width:0}
.t-name{font-size:11.5px;color:#b0adb6;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.terreno-item.active .t-name{color:#fff}
.t-rol{font-size:11px;color:#b8b4ac;font-family:monospace;font-weight:500;letter-spacing:0.2px;margin-top:1px}
.terreno-item.active .t-rol{color:#ffffff}
.prio-chip{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.prio-alta{background:var(--red-lt);color:var(--red)}
.prio-media{background:var(--amber-lt);color:var(--amber)}
.prio-baja{background:var(--green-lt);color:var(--green)}

.multi-select{position:relative;display:inline-block}
.ms-trigger{padding:6px 12px;border:1px solid var(--line);border-radius:6px;background:var(--white);font-size:12px;cursor:pointer;min-width:150px;max-width:220px;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-trigger:hover{border-color:var(--teal)}
.ms-trigger.has-selection{border-color:var(--teal);color:var(--teal);font-weight:500}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1px solid var(--line);border-radius:6px;padding:5px;min-width:210px;max-height:300px;overflow-y:auto;z-index:100;box-shadow:var(--shadow-lg)}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:4px;cursor:pointer;font-size:12px;user-select:none}
.ms-item:hover{background:var(--bg)}
.ms-item input{width:auto;margin:0;cursor:pointer}
.ms-clear{width:100%;margin-top:4px;padding:6px;font-size:11px;color:var(--red);background:none;border:none;border-top:1px solid var(--line);cursor:pointer;font-weight:500}
.ms-clear:hover{background:var(--red-lt)}
.ms-empty{padding:10px;color:var(--ink3);font-size:11px;text-align:center}

.audit-bell-wrap{position:relative;display:flex;align-items:center}
.audit-bell-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;transition:background 0.15s;position:relative;line-height:1}
.audit-bell-btn:hover{background:var(--bg2)}
.audit-badge{position:absolute;top:0;right:2px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 4px;min-width:14px;text-align:center;line-height:14px}
.audit-panel{position:absolute;top:calc(100% + 8px);right:0;width:380px;background:var(--white);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lg);z-index:300;max-height:480px;overflow:hidden;display:flex;flex-direction:column}
.audit-panel-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.audit-panel-head h4{font-size:13px;font-weight:700;color:var(--ink);margin:0}
.audit-list{overflow-y:auto;flex:1}
.audit-list::-webkit-scrollbar{width:4px}
.audit-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.audit-entry{padding:10px 16px;border-bottom:1px solid var(--line);transition:background 0.1s}
.audit-entry:last-child{border-bottom:none}
.audit-entry:hover{background:var(--bg)}
.audit-entry-who{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:8px}
.audit-who-name{font-size:11px;font-weight:700;color:var(--teal)}
.audit-when{font-size:10px;color:var(--ink3);white-space:nowrap}
.audit-entry-proj{font-size:10px;color:var(--ink3);margin-bottom:2px}
.audit-entry-desc{font-size:12px;color:var(--ink2);line-height:1.4}
.audit-empty{padding:28px;text-align:center;color:var(--ink3);font-size:12px}

.dash-subtabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line)}
.dash-subtab{padding:9px 16px;border:none;background:none;font-size:13px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-weight:500}
.dash-subtab:hover{color:var(--ink2)}
.dash-subtab.active{color:var(--teal);border-bottom-color:var(--teal)}
.sidebar-bottom{padding:6px 8px 12px;display:flex;flex-direction:column;gap:4px}
.sbtn{width:100%;padding:8px 12px;border-radius:6px;font-size:11.5px;font-weight:500;transition:all 0.15s;text-align:left;border:1px solid;display:flex;align-items:center;gap:7px}
.sbtn-primary{background:rgba(26,95,110,0.25);border-color:rgba(26,95,110,0.4);color:#90c4cc}
.sbtn-primary:hover{background:rgba(26,95,110,0.4)}
.sbtn-ghost{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.09);color:#808070}
.sbtn-ghost:hover{background:rgba(255,255,255,0.08);color:#c0bdb6}
.sync-bar{border-top:1px solid rgba(255,255,255,0.07);padding:9px 14px;display:flex;align-items:center;gap:7px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background 0.3s}
.sync-dot.ok{background:#5cba8a;box-shadow:0 0 5px rgba(92,186,138,0.45)}
.sync-dot.loading{background:#e09a5c;animation:pulse 0.9s infinite}
.sync-dot.error{background:#e05c5c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-text{font-size:10px;color:#5a5750;flex:1}
.sync-refresh{background:none;border:none;color:#5a5750;cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;transition:color 0.14s}
.sync-refresh:hover{color:#a0a090}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--line);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.topbar-left h2{font-size:18px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
.topbar-right{display:flex;gap:10px;align-items:center;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px 24px 40px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--white);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line);border-top:3px solid var(--line)}
.kpi-card.teal{border-top-color:var(--teal)}
.kpi-card.alert{border-top-color:var(--red)}
.kpi-card.warning{border-top-color:var(--amber)}
.kpi-card.good{border-top-color:var(--green)}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);font-weight:600;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:700;color:var(--ink);font-family:'IBM Plex Sans',sans-serif;line-height:1.1}
.kpi-card.alert .kpi-value{color:var(--red)}
.kpi-card.warning .kpi-value{color:var(--amber)}
.kpi-card.good .kpi-value{color:var(--green)}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:5px}

/* ── TABS ── */
.tab-nav{display:flex;border-bottom:2px solid var(--line);margin-bottom:18px}
.tab-btn{padding:9px 18px;font-size:13px;font-weight:500;color:var(--ink3);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all 0.14s;white-space:nowrap}
.tab-btn:hover{color:var(--ink2)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}

/* ── INFO ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.info-card{background:var(--white);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line)}
.info-card h4{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink3);font-weight:600;margin-bottom:14px;font-family:'IBM Plex Sans',sans-serif}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--ink3)}
.info-val{font-size:13px;color:var(--ink);font-weight:500;text-align:right;max-width:60%}
.badge-chip{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
.chip-si{background:var(--red-lt);color:var(--red)}
.chip-no{background:var(--green-lt);color:var(--green)}

/* ── RESPONSABLE BADGE ── */
.resp-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.resp-mauricio{background:var(--teal-lt);color:var(--teal)}
.resp-solange{background:var(--purple-lt);color:var(--purple)}
.resp-none{background:var(--bg2);color:var(--ink3)}

/* ── CUOTAS ── */
.cuotas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.anio-nav{display:flex;align-items:center;gap:10px}
.anio-nav button{width:30px;height:30px;border-radius:6px;border:1px solid var(--line);background:var(--white);color:var(--ink2);font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.13s}
.anio-nav button:hover{background:var(--bg2)}
.anio-display{font-size:17px;font-weight:700;color:var(--ink);min-width:52px;text-align:center;font-family:'IBM Plex Sans',sans-serif}
.cuotas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.cuota-card{background:var(--white);border-radius:10px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);border-top:3px solid var(--line)}
.cuota-card.pagada{border-top-color:var(--green)}
.cuota-card.vencida{border-top-color:var(--red)}
.cuota-card.proxima{border-top-color:var(--amber)}
.cuota-card.pendiente{border-top-color:var(--line)}
.cuota-num{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:8px}
.cuota-status-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;margin-bottom:10px}
.st-pagada{background:var(--green-lt);color:var(--green)}
.st-vencida{background:var(--red-lt);color:var(--red)}
.st-proxima{background:var(--amber-lt);color:var(--amber)}
.st-pendiente{background:var(--bg2);color:var(--ink3)}
.cuota-monto-input{width:100%;background:transparent;border:none;border-bottom:1px dashed var(--line);font-size:18px;font-weight:700;color:var(--ink);padding:2px 0;outline:none;transition:border-color 0.14s}
.cuota-monto-input:focus{border-bottom-color:var(--teal)}
.cuota-fecha{font-size:11px;color:var(--ink3);margin-top:4px;margin-bottom:12px;line-height:1.6}
.cuota-divider{height:1px;background:var(--line);margin-bottom:10px}
.cuota-actions input[type=date]{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:5px 8px;font-size:12px;color:var(--ink);outline:none;margin-bottom:7px;transition:border 0.14s}
.cuota-actions input[type=date]:focus{border-color:var(--teal)}
.cuotas-summary{display:flex;gap:0;margin-top:18px;background:var(--white);border-radius:9px;border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow)}
.sum-item{flex:1;padding:12px 16px;border-right:1px solid var(--line)}
.sum-item:last-child{border-right:none}
.sum-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);font-weight:600;margin-bottom:4px}
.sum-val{font-size:15px;font-weight:700;color:var(--ink);font-family:'IBM Plex Sans',sans-serif}
.sum-val.red{color:var(--red)}
.sum-val.green{color:var(--green)}
.sum-val.amber{color:var(--amber)}

/* ── BITÁCORA ── */
.bitacora-add-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.add-entry-box{background:var(--white);border-radius:10px;border:1px solid var(--line);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.add-entry-box .title{font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:14px}
.bitacora-list{display:flex;flex-direction:column;gap:10px}
.bita-entry{background:var(--white);border-radius:10px;box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;transition:box-shadow 0.14s}
.bita-entry:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.bita-header{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.bita-date{font-size:11px;font-weight:700;color:#fff;background:var(--teal);padding:3px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.bita-detalle{flex:1;font-size:13px;color:var(--ink);line-height:1.5}
.bita-meta{display:flex;gap:7px;align-items:center;flex-shrink:0}
.estatus-chip{padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600}
.est-pendiente{background:var(--bg2);color:var(--ink3)}
.est-proceso{background:var(--teal-lt);color:var(--teal)}
.est-finalizada{background:var(--green-lt);color:var(--green)}
.bita-body{border-top:1px solid var(--line);padding:12px 16px}
.files-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.file-item{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--bg);border-radius:7px;border:1px solid var(--line)}
.file-icon{font-size:17px;flex-shrink:0}
.file-name{flex:1;font-size:12px;color:var(--teal);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-name:hover{text-decoration:underline}
.file-size{font-size:10.5px;color:var(--ink3);flex-shrink:0}
.file-del{background:none;border:none;color:var(--ink3);cursor:pointer;padding:2px 5px;border-radius:4px;font-size:12px;transition:all 0.13s;flex-shrink:0}
.file-del:hover{color:var(--red);background:var(--red-lt)}
.upload-zone{display:block;border:2px dashed var(--line);border-radius:8px;padding:13px 16px;text-align:center;cursor:pointer;transition:all 0.15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:var(--teal-lt)}
.upload-zone input{display:none}
.upload-zone p{font-size:12px;color:var(--ink3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:6px;font-size:13px;font-weight:500;border:none;transition:all 0.15s;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--ink2);border:1px solid var(--line)}
.btn-outline:hover{background:var(--bg2)}
.btn-ghost{background:transparent;color:var(--ink3)}
.btn-ghost:hover{background:var(--bg2);color:var(--ink2)}
.btn-danger{background:var(--red-lt);color:var(--red);border:1px solid rgba(192,57,43,0.2)}
.btn-danger:hover{background:rgba(192,57,43,0.14)}
.btn-success{background:var(--green-lt);color:var(--green);border:1px solid rgba(26,122,74,0.2)}
.btn-success:hover{background:rgba(26,122,74,0.14)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:4px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:12px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;overflow:hidden;animation:fadeUp 0.18s ease}
.modal-lg{max-width:640px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:18px 22px 0;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:17px;color:var(--ink)}
.modal-body{padding:16px 22px;display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:0 22px 18px;display:flex;justify-content:flex-end;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─────────────────────────────────────────────────────
// SUPABASE CLIENT
// ─────────────────────────────────────────────────────
class SupabaseClient {
  constructor(url, anonKey) {
    this.url = url.replace(/\/$/, "");
    this.anonKey = anonKey;
    this.key = anonKey; // kept for backward-compat
    this.authToken = null;
  }
  setAuthToken(token) {
    this.authToken = token || null;
  }
  _h(extra={}) {
    const bearer = this.authToken || this.anonKey;
    return {"Content-Type":"application/json","apikey":this.anonKey,"Authorization":"Bearer "+bearer,...extra};
  }
  async select(table, filter="") {
    const res = await fetch(`${this.url}/rest/v1/${table}${filter?"?"+filter:""}`, {headers:this._h()});
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    return res.json();
  }
  async insert(table, body) {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method:"POST", headers:this._h({"Prefer":"return=representation"}), body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    return res.json();
  }
  async upsert(table, body) {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method:"POST", headers:this._h({"Prefer":"resolution=merge-duplicates,return=minimal"}), body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    return true;
  }
  async patch(table, filter, body) {
    const res = await fetch(`${this.url}/rest/v1/${table}?${filter}`, {
      method:"PATCH", headers:this._h({"Prefer":"return=minimal"}), body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    return true;
  }
  async del(table, filter) {
    const res = await fetch(`${this.url}/rest/v1/${table}?${filter}`, {method:"DELETE", headers:this._h()});
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    return true;
  }
  async uploadFile(bucket, path, file) {
    const bearer = this.authToken || this.anonKey;
    const res = await fetch(`${this.url}/storage/v1/object/${bucket}/${path}`, {
      method:"POST",
      headers:{"apikey":this.anonKey,"Authorization":"Bearer "+bearer,"Content-Type":file.type||"application/octet-stream","x-upsert":"true"},
      body:file
    });
    if(!res.ok) throw new Error(`Upload ${res.status}: ${await res.text()}`);
    return `${this.url}/storage/v1/object/public/${bucket}/${path}`;
  }
  async test() {
    const res = await fetch(`${this.url}/rest/v1/terrenos?limit=1`, {headers:this._h()});
    if(res.status===401) throw new Error("API Key inválida.");
    if(!res.ok&&res.status!==404&&res.status!==406) throw new Error(`Error HTTP ${res.status}`);
    return true;
  }
}
let db = null;

// ─────────────────────────────────────────────────────
// AUDIT LOG (historial de cambios)
// ─────────────────────────────────────────────────────
const emailToNameAudit = (email) => {
  if(!email) return null;
  const local = String(email).split("@")[0];
  return local.split(".").map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(" ");
};
// Stub inicial; se reemplaza cuando el componente App se monta
let logAudit = async () => {};

// ─────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today = () => new Date().toISOString().slice(0,10);
const soon30 = () => { const d=new Date(); d.setDate(d.getDate()+30); return d.toISOString().slice(0,10); };

// File upload validation
const MAX_UPLOAD_BYTES = 10 * 1024 * 1024; // 10 MB
const ALLOWED_UPLOAD_MIMES = new Set([
  "application/pdf",
  "application/msword",
  "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
  "application/vnd.ms-excel",
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  "application/vnd.ms-powerpoint",
  "application/vnd.openxmlformats-officedocument.presentationml.presentation",
  "text/plain","text/csv",
  "image/png","image/jpeg","image/jpg","image/gif","image/webp","image/heic","image/heif"
]);
const ALLOWED_UPLOAD_EXTS = new Set(["pdf","doc","docx","xls","xlsx","ppt","pptx","txt","csv","png","jpg","jpeg","gif","webp","heic","heif"]);
const validateUploadFile = (file) => {
  if(!file) return "Archivo inválido.";
  if(file.size > MAX_UPLOAD_BYTES) return `Archivo demasiado grande: ${(file.size/1024/1024).toFixed(1)} MB. Máximo permitido: 10 MB.`;
  const ext = (file.name.split(".").pop()||"").toLowerCase();
  const mimeOk = file.type && ALLOWED_UPLOAD_MIMES.has(file.type);
  const extOk = ALLOWED_UPLOAD_EXTS.has(ext);
  if(!mimeOk && !extOk) return `Tipo de archivo no permitido (.${ext}). Se permiten: PDF, Word, Excel, PowerPoint, imágenes y texto.`;
  return null; // OK
};

const fmtDate = d => {
  if(!d) return "—";
  const s = String(d).slice(0,10);
  const [y,m,dy] = s.split("-");
  return `${dy}/${m}/${y}`;
};
const fmtCLP = n => {
  if(!n && n!==0) return "—";
  const v = Math.round(Number(n));
  return "$"+v.toLocaleString("es-CL");
};
const fmtM2 = n => n ? Math.round(Number(n)).toLocaleString("es-CL")+" m²" : "—";

// Format a raw string value as Chilean locale with thousand-dot separators.
// dec=false → integer only. dec=true → allow comma decimal, preserves user's partial typing.
const fmtCLInput = (v, dec=false) => {
  if(v===""||v==null) return "";
  const str = String(v);
  if(!dec){
    const digits = str.replace(/[^\d]/g,"");
    return digits ? parseInt(digits).toLocaleString("es-CL") : "";
  }
  const norm = str.replace(",",".");
  if(norm===""||norm===".") return "";
  const endsWithDot = norm.endsWith(".") && norm.indexOf(".")===norm.length-1;
  const [ip, dp=""] = norm.split(".");
  const cleanInt = ip.replace(/[^\d]/g,"");
  const intFmt = cleanInt ? parseInt(cleanInt).toLocaleString("es-CL") : "";
  const cleanDp = dp.replace(/[^\d]/g,"");
  if(cleanDp) return intFmt+","+cleanDp;
  if(endsWithDot) return intFmt+",";
  return intFmt;
};
const parseCLInput = (s, dec=false) => dec
  ? s.replace(/\./g,"").replace(",",".")
  : s.replace(/[^\d]/g,"");

const CUOTA_DATES = {1:"04-30", 2:"06-30", 3:"09-30", 4:"11-28"};
const CUOTA_LABELS = {1:"1ª Cuota — Abril", 2:"2ª Cuota — Junio", 3:"3ª Cuota — Septiembre", 4:"4ª Cuota — Noviembre"};
const CUOTA_SHORT  = {1:"1ª", 2:"2ª", 3:"3ª", 4:"4ª"};
const MES_NAMES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const cuotaDisplayLabel = (c) => {
  if(c.numero>=1 && c.numero<=4) return CUOTA_LABELS[c.numero] || ("Cuota "+c.numero);
  if(c.fecha_vencimiento){
    const mes = parseInt(String(c.fecha_vencimiento).slice(5,7),10)-1;
    return MES_NAMES[mes] ? "Extra — "+MES_NAMES[mes] : "Cuota extra";
  }
  return "Cuota extra";
};
const cuotaDisplayShort = (c) => c.numero>=1 && c.numero<=4 ? (CUOTA_SHORT[c.numero]||c.numero) : "Extra";
const RESPONSABLES = ["Domingo Mackenna","Mauricio González","Rodrigo Ibarra","Solange Faúndez"];
const BITACORA_RESPONSABLES = ["Solange Faúndez","Rodrigo Ibarra"];
const ESTATUS_OPTS = ["Pendiente","En Proceso","Finalizada"];
const PRIORIDADES = ["Alta","Media","Baja"];
const CIUDADES = ["Arica","Iquique","Antofagasta","Santiago","Talcahuano","Maipú","Huechuraba"];

function cuotaStatus(c) {
  if(c.pagado) return "pagada";
  const t = today();
  const s = soon30();
  if(c.fecha_vencimiento && c.fecha_vencimiento < t) return "vencida";
  if(c.fecha_vencimiento && c.fecha_vencimiento <= s) return "proxima";
  return "pendiente";
}
function fileIcon(tipo) {
  if(!tipo) return "📎";
  if(tipo.includes("pdf")) return "📄";
  if(tipo.includes("word")||tipo.includes("document")) return "📝";
  if(tipo.includes("image")||tipo.includes("jpg")||tipo.includes("png")) return "🖼";
  if(tipo.includes("sheet")||tipo.includes("excel")) return "📊";
  return "📎";
}
function fmtSize(b) {
  if(!b) return "";
  if(b<1024) return b+"B";
  if(b<1048576) return (b/1024).toFixed(1)+"KB";
  return (b/1048576).toFixed(1)+"MB";
}

// ─────────────────────────────────────────────────────
// MULTI-SELECT (dropdown with checkboxes)
// ─────────────────────────────────────────────────────
function MultiSelect({label, options, selected, onChange}) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    if(!open) return;
    const handler = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  },[open]);
  const count = selected.length;
  const trigLabel = count===0 ? label : `${label} (${count})`;
  return (
    <div className="multi-select" ref={ref}>
      <button className={"ms-trigger"+(count>0?" has-selection":"")} onClick={()=>setOpen(o=>!o)}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trigLabel}</span>
        <span style={{fontSize:9,opacity:0.6}}>▼</span>
      </button>
      {open && (
        <div className="ms-dropdown">
          {options.length===0 ? (
            <div className="ms-empty">Sin opciones</div>
          ) : options.map(opt => {
            const isObj = typeof opt === "object";
            const val = isObj ? opt.value : opt;
            const lbl = isObj ? opt.label : opt;
            return (
              <label key={String(val)} className="ms-item">
                <input type="checkbox"
                  checked={selected.includes(val)}
                  onChange={e => {
                    const next = e.target.checked
                      ? [...selected, val]
                      : selected.filter(x=>x!==val);
                    onChange(next);
                  }}/>
                <span>{lbl}</span>
              </label>
            );
          })}
          {count>0 && <button className="ms-clear" onClick={()=>onChange([])}>✕ Limpiar selección</button>}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────
// RESPONSABLE FIELD (dropdown + optional free text)
// ─────────────────────────────────────────────────────
function ResponsableField({value, onChange, options}) {
  const startsCustom = !!value && !options.includes(value);
  const [otro, setOtro] = useState(startsCustom);
  useEffect(()=>{
    if(!value){setOtro(false);return;}
    if(!options.includes(value)) setOtro(true);
  },[value, options]);
  const mode = otro ? "__otro__" : (value || "");
  return (
    <>
      <select value={mode} onChange={e=>{
        const v = e.target.value;
        if(v==="__otro__"){setOtro(true); onChange("");}
        else {setOtro(false); onChange(v||null);}
      }}>
        <option value="">— Sin asignar —</option>
        {options.map(r=><option key={r} value={r}>{r}</option>)}
        <option value="__otro__">— Otro (escribir) —</option>
      </select>
      {otro && (
        <input type="text" style={{marginTop:6}} placeholder="Nombre del responsable"
          value={value||""} onChange={e=>onChange(e.target.value)} autoFocus/>
      )}
    </>
  );
}

// ─────────────────────────────────────────────────────
function SetupScreen({onSetup}) {
  const [url,setUrl]=useState("");
  const [key,setKey]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");

  const connect = async () => {
    const u=url.trim().replace(/\/$/,""), k=key.trim();
    if(!u||!k){setErr("Debes ingresar la URL y la Key.");return;}
    if(!u.startsWith("https://")){setErr("La URL debe comenzar con https://");return;}
    setBusy(true);setErr("");
    try{
      const client=new SupabaseClient(u,k);
      await client.test();
      localStorage.setItem("sb_url",u);localStorage.setItem("sb_key",k);
      onSetup(u,k);
    }catch(e){setErr("⚠️ "+e.message);}
    setBusy(false);
  };

  return (
    <div className="setup-screen">
      <div className="setup-card">
        <h2>Conectar Base de Datos</h2>
        <p className="setup-sub">Ingresa tus credenciales de Supabase para activar la sincronización del gestor de terrenos.</p>
        <div className="setup-steps">
          <div className="setup-step"><div className="step-n">1</div><div className="step-txt">Supabase → <code>Project Settings</code> → <code>Data API</code></div></div>
          <div className="setup-step"><div className="step-n">2</div><div className="step-txt">Copia la <strong>Project URL</strong></div></div>
          <div className="setup-step"><div className="step-n">3</div><div className="step-txt">En <code>API Keys</code> → copia la key <strong>anon</strong></div></div>
        </div>
        {err&&<div className="setup-error">{err}</div>}
        <div className="field" style={{marginBottom:12}}>
          <label>Project URL</label>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxxxxxxxxxx.supabase.co" onKeyDown={e=>e.key==="Enter"&&connect()}/>
        </div>
        <div className="field" style={{marginBottom:20}}>
          <label>Anon Key</label>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGci..." onKeyDown={e=>e.key==="Enter"&&connect()}/>
        </div>
        <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:"11px"}} onClick={connect} disabled={busy}>
          {busy?"⏳ Conectando...":"✓ Conectar y Guardar"}
        </button>
        <p style={{fontSize:11,color:"var(--ink3)",marginTop:12,textAlign:"center"}}>Las credenciales se guardan solo en tu navegador.</p>
      </div>
    </div>
  );
}

function ContribChart({cuotas, selectedPeriods=[], onTogglePeriod}) {
  const groups = {};
  cuotas.forEach(c=>{
    const isExtra = c.numero>4;
    const key = isExtra ? `${c.anio}-Extras` : `${c.anio}-Q${c.numero}`;
    const label = key;
    if(!groups[key]) groups[key]={key,label,anio:c.anio,numero:isExtra?null:c.numero,isExtras:isExtra,total:0,paid:0};
    const m=parseInt(c.monto)||0;
    groups[key].total+=m;
    if(c.pagado) groups[key].paid+=m;
  });
  const data=Object.values(groups).sort((a,b)=>{
    if(a.anio!==b.anio) return a.anio-b.anio;
    const aOrd = a.isExtras ? 5 : a.numero;
    const bOrd = b.isExtras ? 5 : b.numero;
    return aOrd-bOrd;
  });
  if(data.length===0) return <div style={{textAlign:"center",padding:"30px",color:"var(--ink3)",fontSize:13}}>Sin datos de cuotas. Genera cuotas en cada terreno para ver la evolución.</div>;
  const maxVal=Math.max(...data.map(d=>d.total),1);
  const barW=40,gap=12,padL=72,padR=20,padT=18,padB=52,chartH=160;
  const totalW=padL+data.length*(barW+gap)-gap+padR;
  const fmtM=v=>{if(v>=1e9)return"$"+(v/1e9).toFixed(1)+"B";if(v>=1e6)return"$"+(v/1e6).toFixed(0)+"M";return"$"+(v/1e3).toFixed(0)+"K";};
  const ticks=[0,0.25,0.5,0.75,1];
  const barColor="#1a5f6e"; // teal — cuotas normales (Q1-Q4)
  const extrasColor="#b87262"; // rojo tenue — cuotas extras (adicionales a las 4 legales)
  const clickable = typeof onTogglePeriod === "function";
  const selSet = new Set(selectedPeriods||[]);
  const anyFilter = selSet.size > 0;
  return (
    <div className="chart-scroll">
      <svg viewBox={`0 0 ${totalW} ${chartH+padT+padB}`} style={{minWidth:Math.max(500,totalW),height:chartH+padT+padB,display:"block"}}>
        {ticks.map(p=>{
          const y=padT+chartH*(1-p);
          return <g key={p}>
            <line x1={padL} y1={y} x2={totalW-padR} y2={y} stroke="var(--line)" strokeWidth="1"/>
            <text x={padL-6} y={y+4} textAnchor="end" fontSize="10" fill="var(--ink3)">{fmtM(maxVal*p)}</text>
          </g>;
        })}
        {data.map((d,i)=>{
          const x=padL+i*(barW+gap);
          const tH=(d.total/maxVal)*chartH;
          const pH=(d.paid/maxVal)*chartH;
          const uH=tH-pH;
          const col = d.isExtras ? extrasColor : barColor;
          const isCurrentYear=d.anio===new Date().getFullYear();
          const isSelected = selSet.has(d.key);
          const dimmed = anyFilter && !isSelected;
          const handleClick = clickable ? ()=>onTogglePeriod(d.key) : undefined;
          return <g key={d.key} onClick={handleClick} style={clickable?{cursor:"pointer"}:undefined} opacity={dimmed?0.35:1}>
            {isSelected && <rect x={x-5} y={padT-4} width={barW+10} height={chartH+26} fill="rgba(224,168,0,0.10)" stroke="#e0a800" strokeWidth="1.5" rx="4"/>}
            {uH>0&&<rect x={x} y={padT+chartH-tH} width={barW} height={uH} fill={col} opacity="0.25" rx="2"/>}
            {pH>0&&<rect x={x} y={padT+chartH-pH} width={barW} height={pH} fill={col} rx="2"/>}
            <rect x={x} y={padT+chartH-tH} width={barW} height={tH} fill="none" stroke={col} strokeWidth="1" rx="2" opacity="0.7"/>
            <text x={x+barW/2} y={padT+chartH-tH-4} textAnchor="middle" fontSize="9" fill="var(--ink3)">{fmtM(d.total)}</text>
            <text x={x+barW/2} y={padT+chartH+15} textAnchor="middle" fontSize="9.5" fill={isCurrentYear?"var(--teal)":"var(--ink2)"} fontWeight={isCurrentYear?"600":"400"}>{d.label}</text>
          </g>;
        })}
        <line x1={padL} y1={padT+chartH} x2={totalW-padR} y2={padT+chartH} stroke="var(--ink3)" strokeWidth="1.5"/>
        <rect x={padL} y={padT+chartH+26} width="10" height="10" fill={barColor} rx="2"/>
        <text x={padL+14} y={padT+chartH+35} fontSize="10" fill="var(--ink3)">Pagado</text>
        <rect x={padL+70} y={padT+chartH+26} width="10" height="10" fill={barColor} opacity="0.25" rx="2" stroke={barColor} strokeWidth="1"/>
        <text x={padL+84} y={padT+chartH+35} fontSize="10" fill="var(--ink3)">Pendiente</text>
        <rect x={padL+155} y={padT+chartH+26} width="10" height="10" fill={extrasColor} rx="2"/>
        <text x={padL+169} y={padT+chartH+35} fontSize="10" fill="var(--ink3)">Extras</text>
      </svg>
    </div>
  );
}

function SobretasaBreakdown({sobretasaSI, sobretasaNO, cuotas, anio, totalConSobre, totalSinSobre, filTerLen, onSelectTerreno}) {
  const [expanded, setExpanded] = useState({si:false, no:false});
  // Cuota total por rol para el año actual
  const cuotasByRol = {};
  cuotas.filter(c=>c.anio===anio).forEach(c=>{
    cuotasByRol[c.terreno_rol] = (cuotasByRol[c.terreno_rol]||0) + (parseInt(c.monto)||0);
  });
  const canNav = typeof onSelectTerreno === "function";
  const renderGroup = (key, label, color, arr, total) => {
    const isOpen = expanded[key];
    const sorted = [...arr].sort((a,b)=>(cuotasByRol[b.rol]||0)-(cuotasByRol[a.rol]||0));
    return (
      <React.Fragment key={key}>
        <div className={"dt-row"+(canNav?" proy-row-clickable":"")}
          style={{gridTemplateColumns:"1fr 70px 130px"}}
          onClick={()=>setExpanded(e=>({...e,[key]:!e[key]}))}
          title={arr.length>0?`Click para ver ${arr.length} terreno${arr.length===1?"":"s"}`:undefined}>
          <span style={{fontWeight:600,color:color}}>
            {label}
            {arr.length>0 && <span className={"proy-expand-arrow"+(isOpen?" open":"")}>▶</span>}
          </span>
          <span style={{textAlign:"center"}}>{arr.length}</span>
          <span style={{textAlign:"right",fontWeight:600,color:color}}>{fmtCLP(total)}</span>
        </div>
        {isOpen && sorted.map(t=>(
          <div key={t.rol} className="dt-row proy-subrow"
            style={{gridTemplateColumns:"1fr 70px 130px"}}
            onClick={(e)=>{e.stopPropagation(); canNav && onSelectTerreno(t.rol);}}
            title={"Ir a "+t.terreno}>
            <span style={{fontSize:11.5,color:"var(--ink2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              └ {t.terreno}
              <span style={{color:"var(--ink3)",fontFamily:"monospace",fontSize:10,marginLeft:4}}>({t.rol}) · {t.ciudad}</span>
            </span>
            <span></span>
            <span style={{textAlign:"right",color:"var(--ink2)",fontSize:11.5}}>{fmtCLP(cuotasByRol[t.rol]||0)}</span>
          </div>
        ))}
        {isOpen && arr.length===0 && (
          <div className="dt-row proy-subrow" style={{gridTemplateColumns:"1fr",cursor:"default"}}>
            <span style={{fontSize:11.5,color:"var(--ink3)",fontStyle:"italic"}}>Sin terrenos en esta categoría</span>
          </div>
        )}
      </React.Fragment>
    );
  };
  return (
    <div className="data-table">
      <div className="dt-head" style={{gridTemplateColumns:"1fr 70px 130px"}}>
        <span>Categoría</span>
        <span style={{textAlign:"center"}}>Terrenos</span>
        <span style={{textAlign:"right"}}>Contribuciones {anio}</span>
      </div>
      {renderGroup("si","⚠ Con sobretasa","var(--red)",sobretasaSI,totalConSobre)}
      {renderGroup("no","✓ Sin sobretasa","var(--green)",sobretasaNO,totalSinSobre)}
      <div className="dt-row" style={{gridTemplateColumns:"1fr 70px 130px",background:"var(--bg)"}}>
        <span style={{fontWeight:700}}>TOTAL</span>
        <span style={{textAlign:"center",fontWeight:600}}>{filTerLen}</span>
        <span style={{textAlign:"right",fontWeight:700}}>{fmtCLP(totalConSobre+totalSinSobre)}</span>
      </div>
    </div>
  );
}

function ProyectosBreakdown({terrenos, cuotas, selectedPeriods=[], onClearPeriods, onSelectTerreno}) {
  const [expanded, setExpanded] = useState({});
  const filtered = selectedPeriods.length>0
    ? cuotas.filter(c=>{
        const key = c.numero>4 ? `${c.anio}-Extras` : `${c.anio}-Q${c.numero}`;
        return selectedPeriods.includes(key);
      })
    : cuotas;
  const terrMap = {};
  terrenos.forEach(t=>{terrMap[t.rol]=t;});
  const byProy = {};
  filtered.forEach(c=>{
    const t = terrMap[c.terreno_rol];
    // Si no hay proyecto, usar el nombre del terreno (o el rol como fallback)
    const proy = (t && t.proyecto && String(t.proyecto).trim())
                 || (t && t.terreno && String(t.terreno).trim())
                 || c.terreno_rol;
    if(!byProy[proy]) byProy[proy] = {proyecto:proy, terrenos:{}, total:0, paid:0};
    if(!byProy[proy].terrenos[c.terreno_rol]){
      byProy[proy].terrenos[c.terreno_rol] = {rol:c.terreno_rol, nombre:(t&&t.terreno)||c.terreno_rol, total:0};
    }
    const m = parseInt(c.monto)||0;
    byProy[proy].terrenos[c.terreno_rol].total += m;
    byProy[proy].total += m;
    if(c.pagado) byProy[proy].paid += m;
  });
  const rows = Object.values(byProy)
    .map(r => ({...r, terrArr: Object.values(r.terrenos).sort((a,b)=>b.total-a.total)}))
    .sort((a,b)=>b.total-a.total);
  const grandTotal = rows.reduce((s,r)=>s+r.total,0);
  const grandTerrenos = new Set(filtered.map(c=>c.terreno_rol)).size;
  const canNavigate = typeof onSelectTerreno === "function";
  const handleRowClick = (r) => {
    if(!canNavigate) return;
    if(r.terrArr.length === 1) onSelectTerreno(r.terrArr[0].rol);
    else setExpanded(e=>({...e, [r.proyecto]: !e[r.proyecto]}));
  };
  return (
    <div>
      <h4 style={{margin:0,marginBottom:10,display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:600,color:"var(--ink2)",fontFamily:"'IBM Plex Sans',sans-serif",flexWrap:"wrap"}}>
        🏗 Contribuciones por proyecto
        {selectedPeriods.length>0 && selectedPeriods.map(p=>(
          <span key={p} className="chart-filter-chip">{p}</span>
        ))}
        {selectedPeriods.length>0 && <button className="btn btn-ghost btn-xs" style={{marginLeft:"auto"}} onClick={onClearPeriods}>✕ Quitar</button>}
      </h4>
      {rows.length===0 ? (
        <div className="dt-empty">Sin datos</div>
      ) : (
        <>
          <div className="proy-table-wrap">
            <div className="dt-head" style={{gridTemplateColumns:"1fr 58px 112px",position:"sticky",top:0,background:"var(--white)",zIndex:1}}>
              <span>Proyecto</span>
              <span style={{textAlign:"center"}}>Terr.</span>
              <span style={{textAlign:"right"}}>Total</span>
            </div>
            {rows.map(r=>{
              const isMulti = r.terrArr.length > 1;
              const isOpen = !!expanded[r.proyecto];
              return (
                <React.Fragment key={r.proyecto}>
                  <div className={"dt-row"+(canNavigate?" proy-row-clickable":"")}
                    style={{gridTemplateColumns:"1fr 58px 112px"}}
                    onClick={()=>handleRowClick(r)}
                    title={canNavigate ? (isMulti ? "Click para ver "+r.terrArr.length+" terrenos" : "Click para ir a "+r.terrArr[0].nombre) : undefined}>
                    <span style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {r.proyecto}
                      {isMulti && <span className={"proy-expand-arrow"+(isOpen?" open":"")}>▶</span>}
                    </span>
                    <span style={{textAlign:"center",color:"var(--ink3)",fontSize:12}}>{r.terrArr.length}</span>
                    <span style={{textAlign:"right",fontWeight:600,color:"var(--teal)",fontSize:12}}>{fmtCLP(r.total)}</span>
                  </div>
                  {isMulti && isOpen && r.terrArr.map(t=>(
                    <div key={t.rol} className={"dt-row proy-subrow"}
                      style={{gridTemplateColumns:"1fr 58px 112px"}}
                      onClick={(e)=>{e.stopPropagation(); canNavigate && onSelectTerreno(t.rol);}}
                      title={"Ir a "+t.nombre}>
                      <span style={{fontSize:11.5,color:"var(--ink2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>└ {t.nombre} <span style={{color:"var(--ink3)",fontFamily:"monospace",fontSize:10}}>({t.rol})</span></span>
                      <span></span>
                      <span style={{textAlign:"right",color:"var(--ink2)",fontSize:11.5}}>{fmtCLP(t.total)}</span>
                    </div>
                  ))}
                </React.Fragment>
              );
            })}
          </div>
          <div className="dt-row" style={{gridTemplateColumns:"1fr 58px 112px",background:"var(--bg2)",fontWeight:700,borderRadius:"0 0 6px 6px",marginTop:-1,border:"1px solid var(--line)",borderTop:"none",padding:"8px 10px"}}>
            <span style={{fontSize:12}}>TOTAL {rows.length} proyecto{rows.length===1?"":"s"}</span>
            <span style={{textAlign:"center",fontSize:12}}>{grandTerrenos}</span>
            <span style={{textAlign:"right",fontSize:12}}>{fmtCLP(grandTotal)}</span>
          </div>
        </>
      )}
    </div>
  );
}
