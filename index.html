function SubtareasSection({bitacoraId, terrenoRol, subtareas, archivosSub, onRefresh}) {
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({descripcion:'',fecha:today(),estatus:'Pendiente',responsable:''});
  const [openId,setOpenId]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [uploading,setUploading]=useState({});
  const [addBusy,setAddBusy]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setEF=(k,v)=>setEditForm(f=>({...f,[k]:v}));
  const dotCol=st=>st==='Finalizada'?'var(--green)':st==='En Proceso'?'var(--teal)':'var(--ink3)';

  const _proj = terrenoRol ? `Terreno ${terrenoRol}` : "";

  const addSub=async()=>{
    if(!form.descripcion.trim()) return;
    setAddBusy(true);
    try{
      await db.insert("subtareas",[{bitacora_id:bitacoraId,descripcion:form.descripcion.trim(),fecha:form.fecha,estatus:form.estatus,responsable:form.responsable||null}]);
      logAudit("nueva_subtarea",`Nueva subtarea en bitácora (${terrenoRol}): "${form.descripcion.trim().slice(0,80)}${form.descripcion.trim().length>80?"…":""}"`,_proj);
      setForm({descripcion:'',fecha:today(),estatus:'Pendiente',responsable:''});
      setShowAdd(false); onRefresh();
    }catch(e){alert("Error: "+e.message);}
    setAddBusy(false);
  };

  const saveSub=async(sub)=>{
    try{
      await db.patch("subtareas","id=eq."+sub.id,{descripcion:editForm.descripcion,fecha:editForm.fecha,estatus:editForm.estatus,responsable:editForm.responsable||null});
      logAudit("editar_subtarea",`Editó subtarea en bitácora (${terrenoRol}): "${String(editForm.descripcion||"").slice(0,80)}${(editForm.descripcion||"").length>80?"…":""}"`,_proj);
      setEditId(null); onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const delSub=async(sub)=>{
    if(!confirm("¿Eliminar subtarea?")) return;
    try{
      await db.del("subtareas","id=eq."+sub.id);
      logAudit("eliminar_subtarea",`Eliminó subtarea en bitácora (${terrenoRol}): "${String(sub.descripcion||"").slice(0,80)}${(sub.descripcion||"").length>80?"…":""}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const uploadSubFile=async(subId,file)=>{
    const err = validateUploadFile(file);
    if(err){ alert(err); return; }
    setUploading(u=>({...u,[subId]:true}));
    try{
      const ext=file.name.split(".").pop()||"bin";
      const path=`${terrenoRol.replace(/\//g,"-")}/sub/${subId}/${uid()}.${ext}`;
      const url=await db.uploadFile("terrenos-archivos",path,file);
      await db.insert("archivos_subtareas",[{subtarea_id:subId,nombre:file.name,url,tipo:file.type,tamano:file.size}]);
      logAudit("subir_archivo_subtarea",`Adjuntó archivo "${file.name}" a una subtarea (${terrenoRol})`,_proj);
      onRefresh();
    }catch(e){alert("Error al subir: "+e.message);}
    setUploading(u=>({...u,[subId]:false}));
  };

  const delSubFile=async(a)=>{
    if(!confirm("¿Eliminar archivo?")) return;
    try{
      await db.del("archivos_subtareas","id=eq."+a.id);
      logAudit("eliminar_archivo_subtarea",`Eliminó archivo "${a.nombre||"sin nombre"}" de una subtarea (${terrenoRol})`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  return (
    <div className="subtareas-section">
      <div className="sub-header">
        <span className="sub-header-title">↳ Subtareas ({subtareas.length})</span>
        <button className="btn btn-outline btn-xs" onClick={()=>setShowAdd(s=>!s)}>{showAdd?"✕":"+ Subtarea"}</button>
      </div>

      {showAdd&&(
        <div className="subtarea-add-form">
          <div className="field" style={{marginBottom:9}}>
            <label>Descripción</label>
            <textarea value={form.descripcion} onChange={e=>set('descripcion',e.target.value)} rows={2} placeholder="Describe la subtarea..."/>
          </div>
          <div className="field-row" style={{marginBottom:9}}>
            <div className="field"><label>Fecha</label><input type="date" value={form.fecha} onChange={e=>set('fecha',e.target.value)}/></div>
            <div className="field"><label>Estado</label>
              <select value={form.estatus} onChange={e=>set('estatus',e.target.value)}>
                {ESTATUS_OPTS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="field" style={{marginBottom:11}}>
            <label>Responsable</label>
            <select value={form.responsable} onChange={e=>set('responsable',e.target.value)}>
              <option value="">— Sin asignar —</option>
              {RESPONSABLES.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
          <button className="btn btn-primary btn-xs" onClick={addSub} disabled={!form.descripcion.trim()||addBusy}>{addBusy?"Guardando...":"Guardar subtarea"}</button>
        </div>
      )}

      {subtareas.map(sub=>{
        const isOpen=openId===sub.id;
        const isEdit=editId===sub.id;
        const files=archivosSub[sub.id]||[];
        return (
          <div key={sub.id} className="subtarea-item">
            <div className="sub-dot" style={{background:dotCol(sub.estatus)}}/>
            <div className="sub-body">
              {isEdit ? (
                <>
                  <div className="field" style={{marginBottom:8}}>
                    <textarea value={editForm.descripcion} onChange={e=>setEF('descripcion',e.target.value)} rows={2} style={{width:"100%",background:"var(--white)",border:"1px solid var(--line)",borderRadius:5,padding:"6px 8px",fontSize:12.5,outline:"none"}}/>
                  </div>
                  <div className="field-row" style={{marginBottom:8}}>
                    <div className="field"><label>Fecha</label><input type="date" value={editForm.fecha} onChange={e=>setEF('fecha',e.target.value)}/></div>
                    <div className="field"><label>Estado</label>
                      <select value={editForm.estatus} onChange={e=>setEF('estatus',e.target.value)}>
                        {ESTATUS_OPTS.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="field" style={{marginBottom:9}}>
                    <label>Responsable</label>
                    <select value={editForm.responsable||''} onChange={e=>setEF('responsable',e.target.value||null)}>
                      <option value="">— Sin asignar —</option>
                      {RESPONSABLES.map(r=><option key={r}>{r}</option>)}
                    </select>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button className="btn btn-primary btn-xs" onClick={()=>saveSub(sub)}>Guardar</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>setEditId(null)}>Cancelar</button>
                  </div>
                </>
              ):(
                <>
                  <div className="sub-desc">{sub.descripcion}</div>
                  <div className="sub-meta">
                    <span className="sub-meta-pill">{fmtDate(sub.fecha)}</span>
                    {sub.responsable&&<span className="sub-meta-pill">· {sub.responsable}</span>}
                    <span className={`estatus-chip est-${sub.estatus==="En Proceso"?"proceso":sub.estatus?.toLowerCase()}`} style={{fontSize:9.5,padding:"1px 6px"}}>{sub.estatus}</span>
                    {files.length>0&&<span className="sub-meta-pill">📎 {files.length}</span>}
                  </div>
                  {isOpen&&(
                    <div className="sub-files-area">
                      {files.map(f=>(
                        <div key={f.id} className="file-item" style={{marginTop:5}}>
                          <span className="file-icon">{fileIcon(f.tipo)}</span>
                          <a href={f.url} target="_blank" rel="noreferrer" className="file-name">{f.nombre}</a>
                          <span className="file-size">{fmtSize(f.tamano)}</span>
                          <button className="file-del" onClick={()=>delSubFile(f)}>🗑</button>
                        </div>
                      ))}
                      <label className="upload-zone" style={{marginTop:7,padding:"8px 12px"}}>
                        <input type="file" multiple onChange={async e=>{for(const f of Array.from(e.target.files)) await uploadSubFile(sub.id,f);e.target.value="";}}/>
                        {uploading[sub.id]?<p>⏳ Subiendo...</p>:<p style={{fontSize:11}}>📎 Adjuntar archivo a subtarea</p>}
                      </label>
                    </div>
                  )}
                </>
              )}
            </div>
            {!isEdit&&(
              <div className="sub-actions">
                <button className="sub-act-btn" onClick={()=>setOpenId(isOpen?null:sub.id)}>{isOpen?"▲":"▼"}</button>
                <button className="sub-act-btn" onClick={()=>{setEditId(sub.id);setEditForm({...sub});}}>✏️</button>
                <button className="sub-act-btn del" onClick={()=>delSub(sub)}>🗑</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────
function Dashboard({terrenos, allCuotas, allBitacora, allDevoluciones=[], onSelectTerreno, hiddenRols}) {
  const [subTab, setSubTab] = useState("principal");

  // Principal tab filters (multi-select)
  const [filterPeriodos, setFilterPeriodos] = useState([]); // ["2025-Q1","2025-Extras",...]
  const [filterCiudades, setFilterCiudades] = useState([]);
  const [filterProyectos, setFilterProyectos] = useState([]);
  const [filterVigente, setFilterVigente] = useState([]);
  const [filterSobretasa, setFilterSobretasa] = useState([]);
  const [expandedYears, setExpandedYears] = useState({});

  // Tareas tab filters (multi-select)
  const [filterBitaCiudades, setFilterBitaCiudades] = useState([]);
  const [filterBitaResp, setFilterBitaResp] = useState([]);
  const [filterBitaEstado, setFilterBitaEstado] = useState([]);

  const visTer = terrenos.filter(t=>!hiddenRols.has(t.rol));
  const visRols = new Set(visTer.map(t=>t.rol));
  const visCuotas = allCuotas.filter(c=>visRols.has(c.terreno_rol));
  const visBita = allBitacora.filter(b=>visRols.has(b.terreno_rol));
  const visDev = allDevoluciones.filter(d=>visRols.has(d.terreno_rol));

  // Filter option lists
  const ciudadOpts = [...new Set(visTer.map(t=>t.ciudad).filter(Boolean))].sort();
  // Proyecto: CASCADEADO por ciudad — si hay filtro de ciudad, solo proyectos de esas ciudades
  const terForProyOpts = filterCiudades.length>0
    ? visTer.filter(t=>filterCiudades.includes(t.ciudad))
    : visTer;
  const proyectoOpts = [...new Set(terForProyOpts.map(t=>t.proyecto).filter(Boolean))].sort();
  const respOpts = [...new Set(visBita.map(b=>b.responsable).filter(Boolean))].sort();

  // Apply principal filters across all portfolio-derived data
  const filTer = visTer.filter(t =>
    (filterCiudades.length===0 || filterCiudades.includes(t.ciudad))
    && (filterProyectos.length===0 || filterProyectos.includes(t.proyecto))
    && (filterVigente.length===0 || filterVigente.includes(t.vigente))
    && (filterSobretasa.length===0 || filterSobretasa.includes(!!t.sobretasa))
  );
  const filRols = new Set(filTer.map(t=>t.rol));
  // filCuotas y filDev solo aplican los filtros principales.
  // Los períodos seleccionados en el chart SOLO filtran la tabla de proyectos.
  const filCuotas = visCuotas.filter(c=>filRols.has(c.terreno_rol));
  const filDev = visDev.filter(d=>filRols.has(d.terreno_rol));
  const filBita = visBita.filter(b=>filRols.has(b.terreno_rol));

  // Auto-deseleccionar proyectos que ya no pertenecen a las ciudades filtradas
  useEffect(()=>{
    if(filterCiudades.length===0) return; // sin filtro de ciudad, no tocar proyectos
    const allowed = new Set(visTer.filter(t=>filterCiudades.includes(t.ciudad)).map(t=>t.proyecto).filter(Boolean));
    setFilterProyectos(curr => curr.filter(p => allowed.has(p)));
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [filterCiudades.join("|")]);

  const anio = new Date().getFullYear();
  const contribAnio = filCuotas.filter(c=>c.anio===anio).reduce((s,c)=>s+(parseInt(c.monto)||0),0);
  const devAnio = filDev.filter(d=>d.fecha&&d.fecha.startsWith(anio+"-")).reduce((s,d)=>s+(parseInt(d.monto)||0),0);
  const netoAnio = contribAnio - devAnio;

  const yearlyMap={};
  const getYearBucket = (y) => {
    if(!yearlyMap[y]) yearlyMap[y] = {anio:y, contrib:0, dev:0, byTerreno:{}};
    return yearlyMap[y];
  };
  const getTerBucket = (yb, rol) => {
    if(!yb.byTerreno[rol]) yb.byTerreno[rol] = {rol, contrib:0, dev:0};
    return yb.byTerreno[rol];
  };
  filCuotas.forEach(c=>{
    const yb = getYearBucket(c.anio);
    const tb = getTerBucket(yb, c.terreno_rol);
    const m = parseInt(c.monto)||0;
    yb.contrib += m;
    tb.contrib += m;
  });
  filDev.forEach(d=>{
    if(!d.fecha) return;
    const y = parseInt(d.fecha.slice(0,4));
    const yb = getYearBucket(y);
    const tb = getTerBucket(yb, d.terreno_rol);
    const m = parseInt(d.monto)||0;
    yb.dev += m;
    tb.dev += m;
  });
  const yearly = Object.values(yearlyMap).sort((a,b)=>b.anio-a.anio);
  const terrMap = {};
  filTer.forEach(t=>{terrMap[t.rol]=t;});

  const totalM2 = filTer.reduce((s,t)=>s+(parseFloat(t.m2_sii)||0),0);
  const totalAvaluo = filTer.reduce((s,t)=>s+(parseInt(t.avaluo)||0),0);

  const sobretasaSI = filTer.filter(t=>t.sobretasa);
  const sobretasaNO = filTer.filter(t=>!t.sobretasa);
  const rolsConSobre = new Set(sobretasaSI.map(t=>t.rol));
  // Totales de sobretasa: SOLO del año en curso (no todos los años)
  const totalConSobre = filCuotas.filter(c=>c.anio===anio && rolsConSobre.has(c.terreno_rol)).reduce((s,c)=>s+(parseInt(c.monto)||0),0);
  const totalSinSobre = filCuotas.filter(c=>c.anio===anio && !rolsConSobre.has(c.terreno_rol)).reduce((s,c)=>s+(parseInt(c.monto)||0),0);
  const pendingBita = filBita.filter(b=>b.estatus==="Pendiente"||b.estatus==="En Proceso");

  const byCiudad={};
  filTer.forEach(t=>{
    if(!byCiudad[t.ciudad]) byCiudad[t.ciudad]={n:0,imp:0};
    byCiudad[t.ciudad].n++;
  });
  filCuotas.filter(c=>c.anio===anio).forEach(c=>{
    const t=filTer.find(x=>x.rol===c.terreno_rol);
    if(t&&byCiudad[t.ciudad]) byCiudad[t.ciudad].imp+=parseInt(c.monto)||0;
  });

  const hasPrincipalFilters = filterCiudades.length||filterProyectos.length||filterVigente.length||filterSobretasa.length;
  const clearPrincipalFilters = () => {
    setFilterCiudades([]); setFilterProyectos([]); setFilterVigente([]); setFilterSobretasa([]);
  };
  const togglePeriodo = (p) => {
    setFilterPeriodos(curr => curr.includes(p) ? curr.filter(x=>x!==p) : [...curr, p]);
  };

  // ── Tareas tab (independent filters) ──
  const bitaFiltered = visBita.filter(b=>{
    const t = visTer.find(x=>x.rol===b.terreno_rol);
    return (filterBitaCiudades.length===0 || (t && filterBitaCiudades.includes(t.ciudad)))
      && (filterBitaResp.length===0 || filterBitaResp.includes(b.responsable))
      && (filterBitaEstado.length===0 || filterBitaEstado.includes(b.estatus));
  });

  const respMap={};
  bitaFiltered.forEach(b=>{
    const r=b.responsable||'Sin asignar';
    if(!respMap[r]) respMap[r]={name:r,total:0,pendiente:0,proceso:0,finalizada:0};
    respMap[r].total++;
    if(b.estatus==='Pendiente') respMap[r].pendiente++;
    else if(b.estatus==='En Proceso') respMap[r].proceso++;
    else if(b.estatus==='Finalizada') respMap[r].finalizada++;
  });
  const respList = Object.values(respMap).sort((a,b)=>b.total-a.total);

  const hasBitaFilters = filterBitaCiudades.length||filterBitaResp.length||filterBitaEstado.length;
  const clearBitaFilters = () => {
    setFilterBitaCiudades([]); setFilterBitaResp([]); setFilterBitaEstado([]);
  };

  const SOBRETASA_OPTS = [{value:true,label:"Con sobretasa"},{value:false,label:"Sin sobretasa"}];
  const VIGENTE_OPTS = [{value:"SI",label:"Vigente — SI"},{value:"NO",label:"Vigente — NO"}];

  return (
    <>
      <div className="dash-subtabs">
        <button className={"dash-subtab"+(subTab==="principal"?" active":"")} onClick={()=>setSubTab("principal")}>📊 Principal</button>
        <button className={"dash-subtab"+(subTab==="tareas"?" active":"")} onClick={()=>setSubTab("tareas")}>📓 Tareas / Bitácora</button>
      </div>

      {subTab==="principal" && (
        <>
          <div className="dash-filter-bar">
            <label style={{marginRight:4}}>Portafolio:</label>
            <MultiSelect label="Ciudad" options={ciudadOpts} selected={filterCiudades} onChange={setFilterCiudades}/>
            <MultiSelect label="Proyecto" options={proyectoOpts} selected={filterProyectos} onChange={setFilterProyectos}/>
            <MultiSelect label="Vigente" options={VIGENTE_OPTS} selected={filterVigente} onChange={setFilterVigente}/>
            <MultiSelect label="Sobretasa" options={SOBRETASA_OPTS} selected={filterSobretasa} onChange={setFilterSobretasa}/>
            {hasPrincipalFilters?<button className="dash-clr" onClick={clearPrincipalFilters}>✕ Limpiar filtros</button>:null}
            <span style={{marginLeft:"auto",fontSize:11,color:"var(--ink3)"}}>
              {filTer.length} terrenos{hasPrincipalFilters?` (de ${visTer.length})`:""}
            </span>
          </div>

          <div className="kpi-grid-5">
            <div className="kpi-card teal">
              <div className="kpi-label">Portafolio total</div>
              <div className="kpi-value">{Math.round(totalM2).toLocaleString("es-CL")}</div>
              <div className="kpi-sub">m² · {filTer.length} terrenos</div>
            </div>
            <div className="kpi-card teal">
              <div className="kpi-label">Avalúo fiscal global</div>
              <div className="kpi-value" style={{fontSize:15}}>{fmtCLP(totalAvaluo)}</div>
              <div className="kpi-sub">Según SII · {anio}</div>
            </div>
            <div className="kpi-card" style={{borderTopColor:"var(--red)"}}>
              <div className="kpi-label">Con sobretasa</div>
              <div className="kpi-value" style={{color:"var(--red)"}}>{sobretasaSI.length}</div>
              <div className="kpi-sub">Cuotas {anio}: {fmtCLP(totalConSobre)}</div>
            </div>
            <div className="kpi-card good">
              <div className="kpi-label">Sin sobretasa</div>
              <div className="kpi-value">{sobretasaNO.length}</div>
              <div className="kpi-sub">Cuotas {anio}: {fmtCLP(totalSinSobre)}</div>
            </div>
            <div className={`kpi-card${pendingBita.length>0?" warning":""}`}>
              <div className="kpi-label">Tareas en bitácora</div>
              <div className="kpi-value">{pendingBita.length}</div>
              <div className="kpi-sub">Pendiente o en proceso</div>
            </div>
          </div>

          <div className="kpi-grid-5" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
            <div className="kpi-card teal">
              <div className="kpi-label">Contribuciones {anio}</div>
              <div className="kpi-value" style={{fontSize:16}}>{fmtCLP(contribAnio)}</div>
              <div className="kpi-sub">Total facturado en cuotas</div>
            </div>
            <div className="kpi-card" style={{borderTopColor:"var(--red)"}}>
              <div className="kpi-label">Devoluciones (caja) {anio}</div>
              <div className="kpi-value" style={{fontSize:16,color:"var(--red)"}}>{fmtCLP(devAnio)}</div>
              <div className="kpi-sub">{filDev.filter(d=>d.fecha&&d.fecha.startsWith(anio+"-")).length} registradas</div>
            </div>
            <div className="kpi-card" style={{borderTopColor:netoAnio>=0?"var(--green)":"var(--red)"}}>
              <div className="kpi-label">Neto {anio}</div>
              <div className="kpi-value" style={{fontSize:16,color:netoAnio>=0?"var(--green)":"var(--red)"}}>{fmtCLP(netoAnio)}</div>
              <div className="kpi-sub">Contribuciones − Devoluciones (caja)</div>
            </div>
          </div>

          <div className="dash-2col">
            <div className="dash-section">
              <h4>📍 Contribuciones {anio} por ciudad</h4>
              <div className="data-table">
                <div className="dt-head" style={{gridTemplateColumns:"1fr 60px 110px"}}>
                  <span>Ciudad</span><span style={{textAlign:"center"}}>Terrenos</span><span style={{textAlign:"right"}}>Total</span>
                </div>
                {Object.entries(byCiudad).sort((a,b)=>b[1].imp-a[1].imp).map(([city,d])=>(
                  <div key={city} className="dt-row" style={{gridTemplateColumns:"1fr 60px 110px"}}>
                    <span style={{fontWeight:600}}>{city}</span>
                    <span style={{textAlign:"center",color:"var(--ink3)"}}>{d.n}</span>
                    <span style={{textAlign:"right",color:"var(--ink2)"}}>{fmtCLP(d.imp)}</span>
                  </div>
                ))}
                {Object.keys(byCiudad).length===0&&<div className="dt-empty">Sin datos</div>}
              </div>
            </div>
            <div className="dash-section">
              <h4>⚖️ Desglose por sobretasa</h4>
              <SobretasaBreakdown
                sobretasaSI={sobretasaSI} sobretasaNO={sobretasaNO}
                cuotas={filCuotas} anio={anio}
                totalConSobre={totalConSobre} totalSinSobre={totalSinSobre}
                filTerLen={filTer.length}
                onSelectTerreno={onSelectTerreno}/>
            </div>
          </div>

          <div className="chart-card">
            <div className="chart-and-breakdown">
              <div>
                <h4>📈 Evolución de contribuciones por año y cuota</h4>
                <ContribChart cuotas={filCuotas} selectedPeriods={filterPeriodos} onTogglePeriod={togglePeriodo}/>
                <div className="chart-help">Haz clic en una o más barras para filtrar el desglose de proyectos (puedes seleccionar varias).</div>
              </div>
              <ProyectosBreakdown
                terrenos={filTer}
                cuotas={filCuotas}
                selectedPeriods={filterPeriodos}
                onClearPeriods={()=>setFilterPeriodos([])}
                onSelectTerreno={onSelectTerreno}
              />
            </div>
          </div>

          <div className="dash-section">
            <h4>📊 Balance anual — contribuciones vs devoluciones (caja)</h4>
            <div className="data-table">
              <div className="dt-head" style={{gridTemplateColumns:"minmax(260px,1.4fr) 1fr 1fr 1fr"}}>
                <span>Año</span>
                <span style={{textAlign:"right"}}>Contribuciones</span>
                <span style={{textAlign:"right"}}>Devoluciones (caja)</span>
                <span style={{textAlign:"right"}}>Neto</span>
              </div>
              {yearly.length===0?(
                <div className="dt-empty">Sin datos</div>
              ):yearly.map(y=>{
                const n = y.contrib - y.dev;
                const isOpen = !!expandedYears[y.anio];
                // Solo mostrar terrenos con contribuciones o devoluciones (>0)
                const terRows = Object.values(y.byTerreno)
                  .filter(t => (t.contrib||0)!==0 || (t.dev||0)!==0)
                  .sort((a,b)=>(b.contrib-b.dev)-(a.contrib-a.dev));
                return (
                  <React.Fragment key={y.anio}>
                    <div className="dt-row proy-row-clickable"
                      style={{gridTemplateColumns:"minmax(260px,1.4fr) 1fr 1fr 1fr"}}
                      onClick={()=>setExpandedYears(e=>({...e,[y.anio]:!e[y.anio]}))}
                      title="Click para ver desglose por terreno">
                      <span style={{fontWeight:700}}>
                        {y.anio}
                        {terRows.length>0 && <span className={"proy-expand-arrow"+(isOpen?" open":"")}>▶</span>}
                      </span>
                      <span style={{textAlign:"right",color:"var(--teal)",fontWeight:600}}>{fmtCLP(y.contrib)}</span>
                      <span style={{textAlign:"right",color:"var(--red)",fontWeight:600}}>{y.dev>0?"−":""}{fmtCLP(y.dev)}</span>
                      <span style={{textAlign:"right",fontWeight:700,color:n>=0?"var(--green)":"var(--red)"}}>{fmtCLP(n)}</span>
                    </div>
                    {isOpen && terRows.map(tr=>{
                      const ter = terrMap[tr.rol];
                      const tn = tr.contrib - tr.dev;
                      const nombre = ter?.terreno||tr.rol;
                      return (
                        <div key={y.anio+"-"+tr.rol} className="dt-row proy-subrow"
                          style={{gridTemplateColumns:"minmax(260px,1.4fr) 1fr 1fr 1fr"}}
                          onClick={(e)=>{e.stopPropagation(); onSelectTerreno && onSelectTerreno(tr.rol);}}
                          title={"Ir a "+nombre}>
                          <span style={{fontSize:11.5,color:"var(--ink2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            └ {nombre} <span style={{color:"var(--ink3)",fontFamily:"monospace",fontSize:10}}>({tr.rol})</span>
                          </span>
                          <span style={{textAlign:"right",color:"var(--ink2)",fontSize:11.5,fontWeight:500}}>{fmtCLP(tr.contrib)}</span>
                          <span style={{textAlign:"right",color:tr.dev>0?"var(--red)":"var(--ink3)",fontSize:11.5,fontWeight:500}}>{tr.dev>0?"−":""}{fmtCLP(tr.dev)}</span>
                          <span style={{textAlign:"right",fontWeight:600,color:tn>=0?"var(--green)":"var(--red)",fontSize:11.5}}>{fmtCLP(tn)}</span>
                        </div>
                      );
                    })}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        </>
      )}

      {subTab==="tareas" && (
        <>
          <div className="dash-filter-bar">
            <label style={{marginRight:4}}>Bitácora:</label>
            <MultiSelect label="Ciudad" options={ciudadOpts} selected={filterBitaCiudades} onChange={setFilterBitaCiudades}/>
            <MultiSelect label="Responsable" options={respOpts} selected={filterBitaResp} onChange={setFilterBitaResp}/>
            <MultiSelect label="Estatus" options={ESTATUS_OPTS} selected={filterBitaEstado} onChange={setFilterBitaEstado}/>
            {hasBitaFilters?<button className="dash-clr" onClick={clearBitaFilters}>✕ Limpiar filtros</button>:null}
            <span style={{marginLeft:"auto",fontSize:11,color:"var(--ink3)"}}>
              {bitaFiltered.length} entradas{hasBitaFilters?` (de ${visBita.length})`:""}
            </span>
          </div>

          <div className="dash-section">
            <h4>👤 Tareas por responsable{hasBitaFilters?" — filtrado":""}</h4>
            <div className="resp-table">
              <div className="resp-table-head" style={{gridTemplateColumns:"1fr 70px 90px 90px 90px"}}>
                <span>Responsable</span>
                <span style={{textAlign:"center"}}>Total</span>
                <span style={{textAlign:"center",color:"var(--ink3)"}}>Pendiente</span>
                <span style={{textAlign:"center",color:"var(--teal)"}}>En Proceso</span>
                <span style={{textAlign:"center",color:"var(--green)"}}>Finalizada</span>
              </div>
              {respList.length===0
                ?<div className="dt-empty">Sin tareas registradas</div>
                :respList.map(r=>(
                  <div key={r.name} className="resp-table-row" style={{gridTemplateColumns:"1fr 70px 90px 90px 90px"}}>
                    <span style={{fontWeight:600}}>{r.name}</span>
                    <span style={{textAlign:"center",fontWeight:700}}>{r.total}</span>
                    <span style={{textAlign:"center"}}>{r.pendiente>0&&<span className="estatus-chip est-pendiente">{r.pendiente}</span>}</span>
                    <span style={{textAlign:"center"}}>{r.proceso>0&&<span className="estatus-chip est-proceso">{r.proceso}</span>}</span>
                    <span style={{textAlign:"center"}}>{r.finalizada>0&&<span className="estatus-chip est-finalizada">{r.finalizada}</span>}</span>
                  </div>
                ))
              }
            </div>
          </div>

          <div className="dash-section">
            <h4>📓 Bitácora — tareas activas{hasBitaFilters?" — filtrado":""}</h4>
            <div className="data-table">
              {bitaFiltered.filter(b=>b.estatus==="Pendiente"||b.estatus==="En Proceso").length===0?(
                <div className="dt-empty">✓ Sin tareas pendientes</div>
              ):(
                <>
                  <div className="dt-head" style={{gridTemplateColumns:"150px 1fr 90px 110px 110px"}}>
                    <span>Terreno · ROL</span><span>Detalle</span><span style={{textAlign:"center"}}>Prioridad</span><span>Estatus</span><span>Responsable</span>
                  </div>
                  {bitaFiltered.filter(b=>b.estatus==="Pendiente"||b.estatus==="En Proceso").slice(0,12).map(b=>{
                    const t=visTer.find(x=>x.rol===b.terreno_rol);
                    return (
                      <div key={b.id} className="dt-row" style={{gridTemplateColumns:"150px 1fr 90px 110px 110px",cursor:"pointer"}} onClick={()=>onSelectTerreno(b.terreno_rol)}>
                        <div>
                          <div style={{fontWeight:600,fontSize:11.5}}>{t?.terreno||b.terreno_rol}</div>
                          <div style={{color:"var(--ink3)",fontSize:10,fontFamily:"monospace"}}>{b.terreno_rol}</div>
                        </div>
                        <span style={{color:"var(--ink2)",fontSize:12}}>{b.detalle.slice(0,70)}{b.detalle.length>70?"…":""}</span>
                        <span style={{textAlign:"center"}}>{b.prioridad&&<span className={`prio-chip prio-${b.prioridad.toLowerCase()}`}>{b.prioridad}</span>}</span>
                        <span><span className={`estatus-chip est-${b.estatus==="En Proceso"?"proceso":b.estatus.toLowerCase()}`}>{b.estatus}</span></span>
                        <span style={{fontSize:12,color:"var(--ink3)"}}>{b.responsable||"—"}</span>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          </div>
        </>
      )}
    </>
  );
}

// ─────────────────────────────────────────────────────
// INFO TAB
// ─────────────────────────────────────────────────────
function InfoTab({terreno, onUpdated}) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({...terreno});
  const [saving, setSaving] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Resincronizar el form cuando cambia el terreno seleccionado
  // (soluciona el bug de quedar con datos del terreno anterior al navegar).
  useEffect(() => {
    setForm({...terreno});
    setEditing(false);
  }, [terreno.rol]);

  const save = async () => {
    setSaving(true);
    try{
      await db.patch("terrenos","rol=eq."+encodeURIComponent(terreno.rol), {
        terreno:form.terreno, vigente:form.vigente, ciudad:form.ciudad,
        m2_sii:parseFloat(form.m2_sii)||0, avaluo:parseInt(form.avaluo)||0,
        uf_m2:parseFloat(form.uf_m2)||0, sobretasa:form.sobretasa,
        proyecto:form.proyecto||null, responsable:form.responsable||null, notas:form.notas||null
      });
      logAudit("editar_terreno",`Editó información del terreno "${form.terreno||terreno.terreno}"`,`${form.terreno||terreno.terreno} · ${terreno.rol}`);
      onUpdated({...form});
      setEditing(false);
    }catch(e){alert("Error: "+e.message);}
    setSaving(false);
  };

  const Row = ({k,v}) => (
    <div className="info-row"><span className="info-key">{k}</span><span className="info-val">{v}</span></div>
  );

  return (
    <div className="info-grid">
      <div className="info-card">
        <h4>Datos del terreno</h4>
        {editing ? (
          <>
            <div className="field" style={{marginBottom:10}}>
              <label>Nombre</label>
              <input value={form.terreno} onChange={e=>set("terreno",e.target.value)}/>
            </div>
            <div className="field-row" style={{marginBottom:10}}>
              <div className="field"><label>Ciudad</label>
                <select value={form.ciudad} onChange={e=>set("ciudad",e.target.value)}>
                  {CIUDADES.map(c=><option key={c}>{c}</option>)}
                  {!CIUDADES.includes(form.ciudad)&&<option>{form.ciudad}</option>}
                </select>
              </div>
              <div className="field"><label>Vigente</label>
                <select value={form.vigente} onChange={e=>set("vigente",e.target.value)}>
                  <option>SI</option><option>NO</option>
                </select>
              </div>
            </div>
            <div className="field" style={{marginBottom:10}}>
              <label>Proyecto asociado</label>
              <input value={form.proyecto||""} onChange={e=>set("proyecto",e.target.value)}/>
            </div>
            <div className="field" style={{marginBottom:12}}>
              <label>Notas</label>
              <textarea value={form.notas||""} onChange={e=>set("notas",e.target.value)} rows={3}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>{saving?"Guardando...":"Guardar"}</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setForm({...terreno});setEditing(false);}}>Cancelar</button>
            </div>
          </>
        ):(
          <>
            <Row k="ROL SII" v={<span style={{fontFamily:"monospace"}}>{terreno.rol}</span>}/>
            <Row k="Ciudad" v={terreno.ciudad}/>
            <Row k="Vigente" v={terreno.vigente}/>
            <Row k="Proyecto" v={terreno.proyecto||"—"}/>
            {terreno.notas&&<div style={{padding:"8px 0"}}>
              <div className="info-key" style={{marginBottom:4}}>Notas</div>
              <div style={{fontSize:12.5,color:"var(--ink2)",lineHeight:1.6}}>{terreno.notas}</div>
            </div>}
            <button className="btn btn-outline btn-sm" style={{marginTop:14}} onClick={()=>setEditing(true)}>✏️ Editar información</button>
          </>
        )}
      </div>

      <div className="info-card">
        <h4>Datos SII</h4>
        {editing ? (
          <>
            <div className="field-row" style={{marginBottom:10}}>
              <div className="field"><label>M² SII</label>
                <input type="text" inputMode="decimal"
                  value={fmtCLInput(form.m2_sii, true)}
                  onChange={e=>set("m2_sii", parseCLInput(e.target.value, true))}/>
              </div>
              <div className="field"><label>UF/m²</label><input type="number" step="0.01" value={form.uf_m2||""} onChange={e=>set("uf_m2",e.target.value)}/></div>
            </div>
            <div className="field" style={{marginBottom:10}}>
              <label>Avalúo fiscal ($CLP)</label>
              <input type="text" inputMode="numeric"
                value={fmtCLInput(form.avaluo, false)}
                onChange={e=>set("avaluo", parseCLInput(e.target.value, false))}/>
            </div>
            <div className="field">
              <label>Sobretasa</label>
              <select value={form.sobretasa?"Si":"No"} onChange={e=>set("sobretasa",e.target.value==="Si")}>
                <option>No</option><option>Si</option>
              </select>
            </div>
          </>
        ):(
          <>
            <Row k="Superficie (M² SII)" v={fmtM2(terreno.m2_sii)}/>
            <Row k="Avalúo fiscal" v={fmtCLP(terreno.avaluo)}/>
            <Row k="UF por m²" v={terreno.uf_m2?Number(terreno.uf_m2).toLocaleString("es-CL",{minimumFractionDigits:2})+" UF":"—"}/>
            <div className="info-row">
              <span className="info-key">Sobretasa</span>
              <span className={`badge-chip ${terreno.sobretasa?"chip-si":"chip-no"}`}>
                {terreno.sobretasa?"Sí aplica":"No aplica"}
              </span>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// CUOTAS TAB
// ─────────────────────────────────────────────────────
function CuotasTab({terreno, cuotas, onRefresh}) {
  const [anio, setAnio] = useState(new Date().getFullYear());
  const [saving, setSaving] = useState({});
  const [payDates, setPayDates] = useState({});
  const [genBusy, setGenBusy] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({anio:new Date().getFullYear(), numero:"1", monto:"", fecha_vencimiento:"", pagado:false, fecha_pago:""});
  const [addBusy, setAddBusy] = useState(false);
  const [editingVenc, setEditingVenc] = useState({});

  const current = cuotas.filter(c=>c.anio===anio);
  const anioRef = useRef(anio);
  useEffect(()=>{anioRef.current=anio;},[anio]);

  const _proj = `${terreno.terreno||terreno.rol} · ${terreno.rol}`;

  const genCuotas = async () => {
    setGenBusy(true);
    const baseMonto = parseInt(terreno._cuota_monto)||0;
    const baseTasa  = parseFloat(terreno._tasa)||0;
    const rows = [1,2,3,4].map(n=>({
      terreno_rol:terreno.rol, anio, numero:n,
      monto:baseMonto, tasa:baseTasa,
      fecha_vencimiento:`${anio}-${CUOTA_DATES[n]}`, pagado:false
    }));
    try{
      await db.upsert("cuotas", rows);
      logAudit("generar_cuotas",`Generó las 4 cuotas de ${anio} en "${terreno.terreno||terreno.rol}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
    setGenBusy(false);
  };

  const markPaid = async (c, paid) => {
    setSaving(s=>({...s,[c.id]:true}));
    try{
      await db.patch("cuotas","id=eq."+c.id, {pagado:paid, fecha_pago:paid?(payDates[c.id]||today()):null});
      logAudit(paid?"marcar_cuota_pagada":"marcar_cuota_impaga",`${paid?"Marcó como pagada":"Marcó como impaga"} la ${cuotaDisplayLabel(c)} de ${c.anio} en "${terreno.terreno||terreno.rol}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
    setSaving(s=>({...s,[c.id]:false}));
  };

  const updateMonto = async (c, monto) => {
    try{
      await db.patch("cuotas","id=eq."+c.id, {monto:parseInt(monto)||0});
      logAudit("editar_monto_cuota",`Editó monto de ${cuotaDisplayLabel(c)} ${c.anio} en "${terreno.terreno||terreno.rol}" a ${fmtCLP(parseInt(monto)||0)}`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const updateVenc = async (c, fecha) => {
    if(!fecha || fecha===c.fecha_vencimiento) return;
    try{
      await db.patch("cuotas","id=eq."+c.id, {fecha_vencimiento:fecha});
      logAudit("editar_fecha_venc",`Editó fecha de vencimiento de ${cuotaDisplayLabel(c)} ${c.anio} en "${terreno.terreno||terreno.rol}" → ${fmtDate(fecha)}`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const updateFechaPago = async (c, fecha) => {
    if(fecha===c.fecha_pago) return;
    try{
      await db.patch("cuotas","id=eq."+c.id, {fecha_pago:fecha||null});
      logAudit("editar_fecha_pago",`Editó fecha de pago de ${cuotaDisplayLabel(c)} ${c.anio} en "${terreno.terreno||terreno.rol}" → ${fecha?fmtDate(fecha):"sin fecha"}`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const deleteCuota = async (c) => {
    const lbl = cuotaDisplayLabel(c);
    if(!confirm(`¿Eliminar "${lbl}" de ${c.anio}?`)) return;
    try{
      await db.del("cuotas","id=eq."+c.id);
      logAudit("eliminar_cuota",`Eliminó ${lbl} de ${c.anio} en "${terreno.terreno||terreno.rol}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const addManual = async () => {
    if(!addForm.fecha_vencimiento){alert("Debes elegir la fecha de vencimiento");return;}
    const targetAnio = anio; // siempre fijo al año visto
    const maxN = cuotas.filter(c=>c.anio===targetAnio).reduce((m,c)=>Math.max(m,c.numero||0),4);
    const finalNumero = maxN + 1; // extras siempre >= 5
    setAddBusy(true);
    try{
      await db.insert("cuotas",[{
        terreno_rol:terreno.rol, anio:targetAnio, numero:finalNumero,
        monto:parseInt(addForm.monto)||0, tasa:0,
        fecha_vencimiento:addForm.fecha_vencimiento,
        pagado:addForm.pagado,
        fecha_pago:addForm.pagado?(addForm.fecha_pago||today()):null
      }]);
      logAudit("agregar_cuota_extra",`Agregó cuota extra de ${fmtCLP(parseInt(addForm.monto)||0)} en "${terreno.terreno||terreno.rol}" (vence ${fmtDate(addForm.fecha_vencimiento)})`,_proj);
      setShowAdd(false);
      setAddForm({anio:anio, numero:"extra", monto:"", fecha_vencimiento:"", pagado:false, fecha_pago:""});
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
    setAddBusy(false);
  };

  const paid    = current.filter(c=>c.pagado).reduce((s,c)=>s+(parseInt(c.monto)||0), 0);
  const pending = current.filter(c=>!c.pagado).reduce((s,c)=>s+(parseInt(c.monto)||0), 0);
  const overdue = current.filter(c=>!c.pagado&&cuotaStatus(c)==="vencida").reduce((s,c)=>s+(parseInt(c.monto)||0), 0);
  const total   = current.reduce((s,c)=>s+(parseInt(c.monto)||0), 0);

  return (
    <>
      <div className="cuotas-header">
        <div className="anio-nav">
          <button onClick={()=>setAnio(a=>a-1)}>◀</button>
          <div className="anio-display">{anio}</div>
          <button onClick={()=>setAnio(a=>a+1)}>▶</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          {current.length===0&&(
            <button className="btn btn-primary btn-sm" onClick={genCuotas} disabled={genBusy}>
              {genBusy?"Generando...":"✦ Generar cuotas "+anio}
            </button>
          )}
          <button className="btn btn-outline btn-sm" onClick={()=>{setAddForm(f=>({...f,anio})); setShowAdd(s=>!s);}}>
            {showAdd?"✕ Cancelar":"➕ Agregar cuota extra"}
          </button>
        </div>
      </div>

      {showAdd&&(
        <div className="add-entry-box">
          <div className="title">Agregar cuota extra — {anio}</div>
          <div className="field-row" style={{marginBottom:10}}>
            <div className="field"><label>Monto ($CLP)</label>
              <input type="text" inputMode="numeric"
                value={addForm.monto?parseInt(String(addForm.monto).replace(/[^\d]/g,"")||"0").toLocaleString("es-CL"):""}
                onChange={e=>setAddForm(f=>({...f,monto:e.target.value.replace(/[^\d]/g,"")}))}
                placeholder="0"/>
            </div>
            <div className="field"><label>Fecha de vencimiento</label>
              <input type="date" value={addForm.fecha_vencimiento} onChange={e=>setAddForm(f=>({...f,fecha_vencimiento:e.target.value}))}/>
            </div>
          </div>
          <div className="field-row" style={{marginBottom:12}}>
            <div className="field">
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                <input type="checkbox" checked={addForm.pagado} onChange={e=>setAddForm(f=>({...f,pagado:e.target.checked}))} style={{width:"auto"}}/>
                Ya está pagada
              </label>
            </div>
            {addForm.pagado&&(
              <div className="field"><label>Fecha de pago</label>
                <input type="date" value={addForm.fecha_pago} onChange={e=>setAddForm(f=>({...f,fecha_pago:e.target.value}))}/>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={addManual} disabled={addBusy}>{addBusy?"Guardando...":"Guardar cuota extra"}</button>
          </div>
        </div>
      )}

      {current.length===0 ? (
        <div style={{textAlign:"center",padding:"50px 20px",color:"var(--ink3)"}}>
          <div style={{fontSize:38,marginBottom:14}}>📋</div>
          <p style={{marginBottom:6}}>No hay cuotas registradas para <strong>{anio}</strong>.</p>
          <p style={{fontSize:12}}>Haz clic en "Generar cuotas {anio}" para crear las 4 cuotas con las fechas estándar.</p>
        </div>
      ):(
        <>
          <div className="cuotas-grid">
            {[1,2,3,4].map(n=>{
              const c = current.find(x=>x.numero===n);
              if(!c) return (
                <div key={n} className="cuota-card" style={{opacity:0.45}}>
                  <div className="cuota-num">{CUOTA_SHORT[n]} Cuota</div>
                  <div style={{fontSize:12,color:"var(--ink3)"}}>No generada</div>
                </div>
              );
              const st = cuotaStatus(c);
              return (
                <div key={n} className={`cuota-card ${st}`}>
                  <div className="cuota-num">{CUOTA_LABELS[n]}</div>
                  <span className={`cuota-status-chip st-${st}`}>
                    {st==="pagada"?"✓ Pagada":st==="vencida"?"⚠ Vencida":st==="proxima"?"⏰ Próxima":"Pendiente"}
                  </span>
                  <div>
                    <MontoInput value={c.monto} onSave={v=>updateMonto(c,v)}/>
                  </div>
                  <div className="cuota-fecha">
                    <label style={{fontSize:10.5,color:"var(--ink3)",display:"block",marginBottom:2}}>Vence</label>
                    <input type="date" defaultValue={c.fecha_vencimiento||""}
                      onBlur={e=>updateVenc(c, e.target.value)}
                      style={{fontSize:11.5,padding:"3px 6px",border:"1px solid var(--line)",borderRadius:4,background:"var(--white)",width:"100%"}}/>
                    {c.pagado&&(
                      <>
                        <label style={{fontSize:10.5,color:"var(--ink3)",display:"block",marginTop:6,marginBottom:2}}>Fecha de pago</label>
                        <input type="date" defaultValue={c.fecha_pago||""}
                          onBlur={e=>updateFechaPago(c, e.target.value)}
                          style={{fontSize:11.5,padding:"3px 6px",border:"1px solid var(--line)",borderRadius:4,background:"var(--white)",width:"100%"}}/>
                      </>
                    )}
                  </div>
                  <div className="cuota-divider"/>
                  <div className="cuota-actions">
                    {!c.pagado&&(
                      <>
                        <label style={{fontSize:10.5,color:"var(--ink3)",display:"block",marginBottom:2}}>Fecha de pago</label>
                        <input type="date" value={payDates[c.id]||today()}
                          onChange={e=>setPayDates(d=>({...d,[c.id]:e.target.value}))}/>
                      </>
                    )}
                    <button className={`btn btn-sm ${c.pagado?"btn-outline btn-success":"btn-primary"}`}
                      style={{width:"100%",justifyContent:"center"}}
                      disabled={saving[c.id]}
                      onClick={()=>markPaid(c,!c.pagado)}>
                      {saving[c.id]?"...":(c.pagado?"✕ Marcar impaga":"✓ Marcar pagada")}
                    </button>
                    <button className="btn btn-danger btn-xs" style={{width:"100%",justifyContent:"center"}} onClick={()=>deleteCuota(c)}>🗑 Eliminar</button>
                  </div>
                </div>
              );
            })}
          </div>

          {current.filter(c=>c.numero>4).length>0 && (
            <div style={{marginTop:24}}>
              <h4 style={{fontSize:13,fontWeight:600,color:"var(--ink2)",marginBottom:12,display:"flex",alignItems:"center",gap:7,fontFamily:"'IBM Plex Sans',sans-serif"}}>➕ Cuotas extras</h4>
              <div className="cuotas-grid">
                {current.filter(c=>c.numero>4).sort((a,b)=>(a.fecha_vencimiento||"").localeCompare(b.fecha_vencimiento||"")).map(c=>{
                  const st = cuotaStatus(c);
                  return (
                    <div key={c.id} className={`cuota-card ${st}`}>
                      <div className="cuota-num">{cuotaDisplayLabel(c)}</div>
                      <span className={`cuota-status-chip st-${st}`}>
                        {st==="pagada"?"✓ Pagada":st==="vencida"?"⚠ Vencida":st==="proxima"?"⏰ Próxima":"Pendiente"}
                      </span>
                      <div><MontoInput value={c.monto} onSave={v=>updateMonto(c,v)}/></div>
                      <div className="cuota-fecha">
                        <label style={{fontSize:10.5,color:"var(--ink3)",display:"block",marginBottom:2}}>Vence</label>
                        <input type="date" defaultValue={c.fecha_vencimiento||""}
                          onBlur={e=>updateVenc(c, e.target.value)}
                          style={{fontSize:11.5,padding:"3px 6px",border:"1px solid var(--line)",borderRadius:4,background:"var(--white)",width:"100%"}}/>
                        {c.pagado&&(
                          <>
                            <label style={{fontSize:10.5,color:"var(--ink3)",display:"block",marginTop:6,marginBottom:2}}>Fecha de pago</label>
                            <input type="date" defaultValue={c.fecha_pago||""}
                              onBlur={e=>updateFechaPago(c, e.target.value)}
                              style={{fontSize:11.5,padding:"3px 6px",border:"1px solid var(--line)",borderRadius:4,background:"var(--white)",width:"100%"}}/>
                          </>
                        )}
                      </div>
                      <div className="cuota-divider"/>
                      <div className="cuota-actions">
                        {!c.pagado&&(
                          <>
                            <label style={{fontSize:10.5,color:"var(--ink3)",display:"block",marginBottom:2}}>Fecha de pago</label>
                            <input type="date" value={payDates[c.id]||today()}
                              onChange={e=>setPayDates(d=>({...d,[c.id]:e.target.value}))}/>
                          </>
                        )}
                        <button className={`btn btn-sm ${c.pagado?"btn-outline btn-success":"btn-primary"}`}
                          style={{width:"100%",justifyContent:"center"}}
                          disabled={saving[c.id]}
                          onClick={()=>markPaid(c,!c.pagado)}>
                          {saving[c.id]?"...":(c.pagado?"✕ Marcar impaga":"✓ Marcar pagada")}
                        </button>
                        <button className="btn btn-danger btn-xs" style={{width:"100%",justifyContent:"center"}} onClick={()=>deleteCuota(c)}>🗑 Eliminar</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div className="cuotas-summary">
            <div className="sum-item"><div className="sum-label">Total {anio}</div><div className="sum-val">{fmtCLP(total)}</div></div>
            <div className="sum-item"><div className="sum-label">Pagado</div><div className="sum-val green">{fmtCLP(paid)}</div></div>
            <div className="sum-item"><div className="sum-label">Por pagar</div><div className="sum-val">{fmtCLP(pending)}</div></div>
            {overdue>0&&<div className="sum-item"><div className="sum-label">Vencido</div><div className="sum-val red">{fmtCLP(overdue)}</div></div>}
          </div>
        </>
      )}
    </>
  );
}

function MontoInput({value, onSave}) {
  const fmtMonto = (n) => {
    if(n===""||n==null) return "";
    const num = String(n).replace(/[^\d]/g,"");
    return num ? parseInt(num).toLocaleString("es-CL") : "";
  };
  const [v, setV] = useState(fmtMonto(value));
  useEffect(()=>setV(fmtMonto(value)),[value]);
  return (
    <input type="text" inputMode="numeric" className="cuota-monto-input" value={v}
      onChange={e=>{
        const raw = e.target.value.replace(/[^\d]/g,"");
        setV(raw ? parseInt(raw).toLocaleString("es-CL") : "");
      }}
      onBlur={()=>{
        const raw = v.replace(/[^\d]/g,"");
        if(String(raw)!==String(value||"")) onSave(raw);
      }}/>
  );
}

function DevolucionesTab({terreno, devoluciones, cuotas, onRefresh}) {
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({fecha:today(), monto:"", motivo:"", notas:""});
  const [addBusy, setAddBusy] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});

  const sorted = [...devoluciones].sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  const totalDev = sorted.reduce((s,d)=>s+(parseInt(d.monto)||0),0);
  const totalContrib = cuotas.reduce((s,c)=>s+(parseInt(c.monto)||0),0);
  const neto = totalContrib - totalDev;

  const _proj = `${terreno.terreno||terreno.rol} · ${terreno.rol}`;

  const add = async () => {
    if(!form.fecha){alert("Debes elegir la fecha");return;}
    if(!form.monto||parseInt(form.monto)<=0){alert("Ingresa un monto válido");return;}
    setAddBusy(true);
    try{
      await db.insert("devoluciones",[{
        terreno_rol:terreno.rol, fecha:form.fecha,
        monto:parseInt(form.monto)||0,
        motivo:form.motivo.trim()||null, notas:form.notas.trim()||null
      }]);
      logAudit("nueva_devolucion",`Nueva devolución de ${fmtCLP(parseInt(form.monto)||0)} en "${terreno.terreno||terreno.rol}"${form.motivo.trim()?` — ${form.motivo.trim()}`:""}`,_proj);
      setForm({fecha:today(), monto:"", motivo:"", notas:""});
      setShowAdd(false);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
    setAddBusy(false);
  };

  const saveEdit = async (d) => {
    try{
      await db.patch("devoluciones","id=eq."+d.id, {
        fecha:editForm.fecha,
        monto:parseInt(editForm.monto)||0,
        motivo:editForm.motivo?.trim()||null,
        notas:editForm.notas?.trim()||null
      });
      logAudit("editar_devolucion",`Editó devolución (${fmtCLP(parseInt(editForm.monto)||0)}) en "${terreno.terreno||terreno.rol}"`,_proj);
      setEditingId(null);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const del = async (d) => {
    if(!confirm("¿Eliminar esta devolución?")) return;
    try{
      await db.del("devoluciones","id=eq."+d.id);
      logAudit("eliminar_devolucion",`Eliminó devolución de ${fmtCLP(parseInt(d.monto)||0)} en "${terreno.terreno||terreno.rol}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  return (
    <>
      <div className="bitacora-add-bar">
        <span style={{fontSize:13,color:"var(--ink3)"}}>
          {sorted.length} {sorted.length===1?"devolución (caja)":"devoluciones (caja)"}
        </span>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(s=>!s)}>
          {showAdd?"✕ Cancelar":"+ Nueva devolución (caja)"}
        </button>
      </div>

      {showAdd&&(
        <div className="add-entry-box">
          <div className="title">Nueva devolución (caja)</div>
          <div className="field-row" style={{marginBottom:10}}>
            <div className="field"><label>Fecha</label>
              <input type="date" value={form.fecha} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))}/>
            </div>
            <div className="field"><label>Monto ($CLP)</label>
              <input type="number" value={form.monto} onChange={e=>setForm(f=>({...f,monto:e.target.value}))} placeholder="0"/>
            </div>
          </div>
          <div className="field" style={{marginBottom:10}}>
            <label>Motivo</label>
            <input value={form.motivo} onChange={e=>setForm(f=>({...f,motivo:e.target.value}))} placeholder="Ej: Ajuste por avalúo, recálculo SII, etc."/>
          </div>
          <div className="field" style={{marginBottom:12}}>
            <label>Notas</label>
            <textarea value={form.notas} onChange={e=>setForm(f=>({...f,notas:e.target.value}))} rows={2}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={add} disabled={addBusy}>{addBusy?"Guardando...":"Guardar devolución (caja)"}</button>
          </div>
        </div>
      )}

      <div className="cuotas-summary" style={{marginBottom:16}}>
        <div className="sum-item"><div className="sum-label">Total contribuciones</div><div className="sum-val">{fmtCLP(totalContrib)}</div></div>
        <div className="sum-item"><div className="sum-label">Total devoluciones (caja)</div><div className="sum-val red">{fmtCLP(totalDev)}</div></div>
        <div className="sum-item"><div className="sum-label">Neto (contrib. − dev.)</div>
          <div className="sum-val" style={{color:neto>=0?"var(--green)":"var(--red)"}}>{fmtCLP(neto)}</div>
        </div>
      </div>

      {sorted.length===0 ? (
        <div style={{textAlign:"center",padding:"50px 20px",color:"var(--ink3)"}}>
          <div style={{fontSize:38,marginBottom:14}}>↩️</div>
          <p>Sin devoluciones (caja) registradas para este terreno.</p>
        </div>
      ):(
        <div className="data-table">
          <div className="dt-head" style={{gridTemplateColumns:"110px 130px 1fr 160px",columnGap:"20px"}}>
            <span>Fecha</span><span style={{textAlign:"right"}}>Monto</span><span>Motivo / Notas</span><span style={{textAlign:"right"}}>Acciones</span>
          </div>
          {sorted.map(d=>{
            const isEd = editingId===d.id;
            return isEd ? (
              <div key={d.id} className="dt-row" style={{gridTemplateColumns:"110px 130px 1fr 160px",columnGap:"20px",alignItems:"start",padding:"10px 12px"}}>
                <input type="date" value={editForm.fecha||""} onChange={e=>setEditForm(f=>({...f,fecha:e.target.value}))}/>
                <input type="number" value={editForm.monto||""} onChange={e=>setEditForm(f=>({...f,monto:e.target.value}))} style={{textAlign:"right"}}/>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <input value={editForm.motivo||""} onChange={e=>setEditForm(f=>({...f,motivo:e.target.value}))} placeholder="Motivo"/>
                  <textarea value={editForm.notas||""} onChange={e=>setEditForm(f=>({...f,notas:e.target.value}))} rows={2} placeholder="Notas"/>
                </div>
                <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                  <button className="btn btn-primary btn-xs" onClick={()=>saveEdit(d)}>Guardar</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setEditingId(null)}>Cancelar</button>
                </div>
              </div>
            ) : (
              <div key={d.id} className="dt-row" style={{gridTemplateColumns:"110px 130px 1fr 160px",columnGap:"20px"}}>
                <span>{fmtDate(d.fecha)}</span>
                <span style={{textAlign:"right",fontWeight:600,color:"var(--red)"}}>−{fmtCLP(d.monto)}</span>
                <span style={{color:"var(--ink2)",fontSize:12}}>
                  {d.motivo||"—"}
                  {d.notas&&<div style={{fontSize:11,color:"var(--ink3)",marginTop:2}}>{d.notas}</div>}
                </span>
                <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                  <button className="btn btn-outline btn-xs" onClick={()=>{setEditingId(d.id);setEditForm({...d});}}>✏️ Editar</button>
                  <button className="btn btn-danger btn-xs" onClick={()=>del(d)}>🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

// ─────────────────────────────────────────────────────
function BitacoraTab({terreno, bitacora, archivos, subtareas, archivosSub, onRefresh, user}) {
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({fecha:today(), detalle:"", estatus:"Pendiente", responsable:"", prioridad:"Media"});
  const [openId, setOpenId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [uploading, setUploading] = useState({});
  const [addBusy, setAddBusy] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setEF = (k,v) => setEditForm(f=>({...f,[k]:v}));

  const _proj = `${terreno.terreno||terreno.rol} · ${terreno.rol}`;

  const addEntry = async () => {
    if(!form.detalle.trim()) return;
    setAddBusy(true);
    try{
      await db.insert("bitacora",[{
        terreno_rol:terreno.rol, fecha:form.fecha, detalle:form.detalle.trim(),
        estatus:form.estatus, responsable:form.responsable?.trim()||null,
        prioridad:form.prioridad||"Media"
      }]);
      logAudit("nueva_bitacora",`Nueva entrada de bitácora en "${terreno.terreno||terreno.rol}": "${form.detalle.trim().slice(0,80)}${form.detalle.trim().length>80?"…":""}"`,_proj);
      setForm({fecha:today(),detalle:"",estatus:"Pendiente",responsable:"",prioridad:"Media"});
      setShowAdd(false);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
    setAddBusy(false);
  };

  const saveEdit = async (entry) => {
    try{
      await db.patch("bitacora","id=eq."+entry.id, {
        fecha:editForm.fecha, detalle:editForm.detalle, estatus:editForm.estatus,
        responsable:editForm.responsable?.trim()||null,
        prioridad:editForm.prioridad||"Media"
      });
      logAudit("editar_bitacora",`Editó entrada de bitácora en "${terreno.terreno||terreno.rol}": "${String(editForm.detalle||"").slice(0,80)}${(editForm.detalle||"").length>80?"…":""}"`,_proj);
      setEditingId(null);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const deleteEntry = async (entry) => {
    if(!confirm("¿Eliminar esta entrada y todos sus archivos adjuntos?")) return;
    try{
      await db.del("bitacora","id=eq."+entry.id);
      logAudit("eliminar_bitacora",`Eliminó entrada de bitácora en "${terreno.terreno||terreno.rol}": "${String(entry.detalle||"").slice(0,80)}${(entry.detalle||"").length>80?"…":""}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const uploadFile = async (entryId, file) => {
    const err = validateUploadFile(file);
    if(err){ alert(err); return; }
    setUploading(u=>({...u,[entryId]:true}));
    try{
      const ext = file.name.split(".").pop()||"bin";
      const path = `${terreno.rol.replace(/\//g,"-")}/${entryId}/${uid()}.${ext}`;
      const url = await db.uploadFile("terrenos-archivos", path, file);
      await db.insert("archivos",[{bitacora_id:entryId, nombre:file.name, url, tipo:file.type, tamano:file.size}]);
      logAudit("subir_archivo",`Adjuntó archivo "${file.name}" a una entrada de bitácora en "${terreno.terreno||terreno.rol}"`,_proj);
      onRefresh();
    }catch(e){alert("Error al subir archivo: "+e.message);}
    setUploading(u=>({...u,[entryId]:false}));
  };

  const deleteFile = async (a) => {
    if(!confirm("¿Eliminar este archivo?")) return;
    try{
      await db.del("archivos","id=eq."+a.id);
      logAudit("eliminar_archivo",`Eliminó archivo "${a.nombre||"sin nombre"}" de bitácora en "${terreno.terreno||terreno.rol}"`,_proj);
      onRefresh();
    }catch(e){alert("Error: "+e.message);}
  };

  const sorted = [...bitacora].sort((a,b)=>b.fecha.localeCompare(a.fecha));

  return (
    <>
      <div className="bitacora-add-bar">
        <span style={{fontSize:13,color:"var(--ink3)"}}>{bitacora.length} {bitacora.length===1?"entrada":"entradas"}</span>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(s=>!s)}>
          {showAdd?"✕ Cancelar":"+ Nueva entrada"}
        </button>
      </div>

      {showAdd&&(
        <div className="add-entry-box">
          <div className="title">Nueva entrada de bitácora</div>
          <div className="field-row" style={{marginBottom:10}}>
            <div className="field"><label>Fecha</label><input type="date" value={form.fecha} onChange={e=>set("fecha",e.target.value)}/></div>
            <div className="field"><label>Estatus</label>
              <select value={form.estatus} onChange={e=>set("estatus",e.target.value)}>
                {ESTATUS_OPTS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="field"><label>Prioridad</label>
              <select value={form.prioridad} onChange={e=>set("prioridad",e.target.value)}>
                {PRIORIDADES.map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
          </div>
          <div className="field" style={{marginBottom:10}}>
            <label>Detalle / Tarea</label>
            <textarea value={form.detalle} onChange={e=>set("detalle",e.target.value)} placeholder="Describe la acción, tarea o nota relevante del terreno..."/>
          </div>
          <div className="field" style={{marginBottom:14}}>
            <label>Responsable</label>
            <ResponsableField value={form.responsable} onChange={v=>set("responsable",v||"")} options={BITACORA_RESPONSABLES}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={addEntry} disabled={!form.detalle.trim()||addBusy}>{addBusy?"Guardando...":"Guardar entrada"}</button>
          </div>
        </div>
      )}

      {sorted.length===0 ? (
        <div style={{textAlign:"center",padding:"50px 20px",color:"var(--ink3)"}}>
          <div style={{fontSize:38,marginBottom:14}}>📓</div>
          <p>Sin entradas en la bitácora de este terreno.</p>
        </div>
      ):(
        <div className="bitacora-list">
          {sorted.map(entry=>{
            const files = archivos[entry.id]||[];
            const isOpen = openId===entry.id;
            const isEditing = editingId===entry.id;
            const st = entry.estatus;
            return (
              <div key={entry.id} className="bita-entry">
                <div className="bita-header" onClick={()=>setOpenId(isOpen?null:entry.id)}>
                  <div className="bita-date">{fmtDate(entry.fecha)}</div>
                  <div className="bita-detalle">{entry.detalle}</div>
                  <div className="bita-meta">
                    {entry.prioridad&&<span className={`prio-chip prio-${entry.prioridad.toLowerCase()}`}>{entry.prioridad}</span>}
                    <span className={`estatus-chip est-${st==="En Proceso"?"proceso":st.toLowerCase()}`}>{st}</span>
                    {entry.responsable&&<span style={{fontSize:11,color:"var(--ink3)"}}>👤 {entry.responsable}</span>}
                    {files.length>0&&<span style={{fontSize:11,color:"var(--ink3)"}}>📎{files.length}</span>}
                    <span style={{fontSize:10,color:"var(--ink3)"}}>{isOpen?"▲":"▼"}</span>
                  </div>
                </div>

                {isOpen&&(
                  <div className="bita-body" onClick={e=>e.stopPropagation()}>
                    {isEditing ? (
                      <>
                        <div className="field-row" style={{marginBottom:9}}>
                          <div className="field"><label>Fecha</label><input type="date" value={editForm.fecha} onChange={e=>setEF("fecha",e.target.value)}/></div>
                          <div className="field"><label>Estatus</label>
                            <select value={editForm.estatus} onChange={e=>setEF("estatus",e.target.value)}>
                              {ESTATUS_OPTS.map(s=><option key={s}>{s}</option>)}
                            </select>
                          </div>
                          <div className="field"><label>Prioridad</label>
                            <select value={editForm.prioridad||"Media"} onChange={e=>setEF("prioridad",e.target.value)}>
                              {PRIORIDADES.map(p=><option key={p}>{p}</option>)}
                            </select>
                          </div>
                        </div>
                        <div className="field" style={{marginBottom:9}}>
                          <label>Detalle</label>
                          <textarea value={editForm.detalle} onChange={e=>setEF("detalle",e.target.value)} rows={3}/>
                        </div>
                        <div className="field" style={{marginBottom:12}}>
                          <label>Responsable</label>
                          <ResponsableField value={editForm.responsable||""} onChange={v=>setEF("responsable",v||null)} options={BITACORA_RESPONSABLES}/>
                        </div>
                        <div style={{display:"flex",gap:8,marginBottom:14}}>
                          <button className="btn btn-primary btn-sm" onClick={()=>saveEdit(entry)}>Guardar</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>setEditingId(null)}>Cancelar</button>
                        </div>
                      </>
                    ):(
                      <div style={{display:"flex",gap:7,marginBottom:files.length>0?12:0}}>
                        <button className="btn btn-outline btn-xs" onClick={()=>{setEditingId(entry.id);setEditForm({...entry});}}>✏️ Editar</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>deleteEntry(entry)}>🗑 Eliminar</button>
                      </div>
                    )}

                    {files.length>0&&(
                      <div className="files-list">
                        {files.map(f=>(
                          <div key={f.id} className="file-item">
                            <span className="file-icon">{fileIcon(f.tipo)}</span>
                            <a href={f.url} target="_blank" rel="noreferrer" className="file-name">{f.nombre}</a>
                            <span className="file-size">{fmtSize(f.tamano)}</span>
                            <button className="file-del" onClick={()=>deleteFile(f)}>🗑</button>
                          </div>
                        ))}
                      </div>
                    )}

                    <label className={`upload-zone${uploading[entry.id]?" drag":""}`}>
                      <input type="file" multiple onChange={async e=>{
                        for(const f of Array.from(e.target.files)) await uploadFile(entry.id, f);
                        e.target.value="";
                      }}/>
                      {uploading[entry.id] ? (
                        <p>⏳ Subiendo archivo...</p>
                      ):(
                        <p>📎 Arrastra archivos o <strong style={{color:"var(--teal)"}}>haz clic para adjuntar</strong> PDF, Word, imágenes...</p>
                      )}
                    </label>
                    <SubtareasSection
                      bitacoraId={entry.id}
                      terrenoRol={terreno.rol}
                      subtareas={subtareas[entry.id]||[]}
                      archivosSub={archivosSub}
                      onRefresh={onRefresh}
                    />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}
